# ============================================================
# cleanup.yml — Bale YouTube Downloader
# پاکسازی خودکار فایل‌های قدیمی‌تر از ۵ دقیقه
# اجرا: هر ۵ دقیقه + امکان اجرای دستی
# ============================================================

name: "🧹 Auto Cleanup Old Videos"

on:
  # اجرای خودکار هر ۵ دقیقه
  schedule:
    - cron: '*/5 * * * *'
  
  # امکان اجرای دستی
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  cleanup:
    name: "🗑️ Delete Expired Videos"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Step 1: Checkout ──────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Step 2: Git Config ────────────────────────────
      - name: "⚙️ Configure Git"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Step 3: Pull latest changes ───────────────────
      - name: "🔄 Pull Latest Changes"
        run: |
          git fetch origin main --quiet
          git reset --hard origin/main --quiet
          echo "✅ Synced with remote"

      # ── Step 4: حذف پوشه‌های قدیمی ──────────────────
      - name: "🗑️ Delete Folders Older Than 5 Minutes"
        id: cleanup
        run: |
          #!/bin/bash
          echo "🧹 Scanning for expired folders..."
          
          DELETED_COUNT=0
          KEPT_COUNT=0
          
          if [ -d "videos" ]; then
            # پیدا کردن همه پوشه‌ها (نه فایل‌ها) در videos/
            for FOLDER in $(find videos -mindepth 1 -maxdepth 1 -type d); do
              FOLDER_NAME=$(basename "$FOLDER")
              
              # بررسی وضعیت از فایل status.json (اگر وجود دارد)
              STATUS_FILE="$FOLDER/status.json"
              STATUS="unknown"
              
              if [ -f "$STATUS_FILE" ]; then
                STATUS=$(jq -r '.status // "unknown"' "$STATUS_FILE" 2>/dev/null || echo "unknown")
              fi
              
              # محاسبه عمر پوشه (بر اساس آخرین commit مرتبط)
              # اگر وضعیت 'sent' باشد و پوشه قدیمی باشد -> حذف
              # اگر پوشه خیلی قدیمی باشد (بیش از ۱۰ دقیقه) -> حذف
              
              FOLDER_AGE_MINUTES=$(find "$FOLDER" -maxdepth 1 -type d -printf '%T@\n' | sort -n | head -1 | awk '{print int((systime() - $1) / 60)}' 2>/dev/null || echo 0)
              
              SHOULD_DELETE=false
              
              # شرط ۱: وضعیت 'sent' و قدیمی‌تر از ۵ دقیقه
              if [ "$STATUS" = "sent" ] && [ "$FOLDER_AGE_MINUTES" -gt 5 ]; then
                SHOULD_DELETE=true
                REASON="Status is 'sent' and age is ${FOLDER_AGE_MINUTES}min"
              fi
              
              # شرط ۲: وضعیت 'ready' اما خیلی قدیمی (بیش از ۳۰ دقیقه) — احتمالاً خطا
              if [ "$STATUS" = "ready" ] && [ "$FOLDER_AGE_MINUTES" -gt 30 ]; then
                SHOULD_DELETE=true
                REASON="Status stuck at 'ready' for ${FOLDER_AGE_MINUTES}min (likely error)"
              fi
              
              # شرط ۳: بدون status.json و قدیمی‌تر از ۱۵ دقیقه
              if [ ! -f "$STATUS_FILE" ] && [ "$FOLDER_AGE_MINUTES" -gt 15 ]; then
                SHOULD_DELETE=true
                REASON="No status.json and age is ${FOLDER_AGE_MINUTES}min"
              fi
              
              # شرط ۴: وضعیت 'error' یا 'failed'
              if [ "$STATUS" = "error" ] || [ "$STATUS" = "failed" ]; then
                SHOULD_DELETE=true
                REASON="Status is '$STATUS'"
              fi
              
              if [ "$SHOULD_DELETE" = true ]; then
                echo "  🗑️ Deleting: $FOLDER_NAME ($REASON)"
                rm -rf "$FOLDER"
                DELETED_COUNT=$((DELETED_COUNT + 1))
              else
                echo "  ✅ Keeping: $FOLDER_NAME (status: $STATUS, age: ${FOLDER_AGE_MINUTES}min)"
                KEPT_COUNT=$((KEPT_COUNT + 1))
              fi
            done
          else
            echo "ℹ️ No videos directory found. Nothing to clean."
          fi
          
          echo ""
          echo "════════════════════════════════════════"
          echo "📊 Cleanup Summary:"
          echo "   🗑️ Deleted: $DELETED_COUNT folder(s)"
          echo "   ✅ Kept: $KEPT_COUNT folder(s)"
          echo "════════════════════════════════════════"
          
          echo "DELETED_COUNT=$DELETED_COUNT" >> $GITHUB_OUTPUT
          echo "KEPT_COUNT=$KEPT_COUNT" >> $GITHUB_OUTPUT

      # ── Step 5: Commit & Push (if deletions happened) ──
      - name: "📤 Commit & Push Cleanup"
        if: steps.cleanup.outputs.DELETED_COUNT != '0'
        run: |
          #!/bin/bash
          echo "📤 Committing cleanup changes..."
          
          git add -A videos/
          
          # فقط اگر تغییری وجود دارد commit کن
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit (files already deleted from remote?)"
            exit 0
          fi
          
          DELETED=${{ steps.cleanup.outputs.DELETED_COUNT }}
          
          git commit -m "🧹 Auto-cleanup: Removed $DELETED expired folder(s) [skip ci]" --quiet || {
            echo "ℹ️ Nothing to commit"
            exit 0
          }
          
          # تلاش برای push (با ۳ بار تلاش مجدد)
          for i in 1 2 3; do
            if timeout 60 git push origin main 2>&1; then
              echo "✅ Cleanup pushed successfully (attempt $i)"
              exit 0
            else
              if [ $i -lt 3 ]; then
                echo "⚠️ Push attempt $i failed, retrying..."
                sleep 5
                git fetch origin main --quiet
                git reset --hard origin/main --quiet
              fi
            fi
          done
          
          echo "⚠️ Push failed after 3 attempts. Will try again next cycle."

      # ── Step 6: گزارش نهایی ──────────────────────────
      - name: "📊 Final Report"
        if: always()
        run: |
          echo "════════════════════════════════════════════"
          echo "  ✅ Cleanup workflow completed"
          echo "════════════════════════════════════════════"
          echo "  🗑️ Deleted: ${{ steps.cleanup.outputs.DELETED_COUNT }}"
          echo "  ✅ Kept: ${{ steps.cleanup.outputs.KEPT_COUNT }}"
          echo "════════════════════════════════════════════"
