# ============================================================
# check-status.yml — Bale YouTube Downloader
# جایگزین cron-check.php — مستقیم روی گیت‌هاب
# ============================================================

name: "🔍 Check Download Status"

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: "Chat ID of the user"
        required: true
        type: string
      message_id:
        description: "Message ID to edit"
        required: false
        type: string
        default: ""

jobs:
  check:
    name: "📊 Check & Send Files"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      # ── Step 1: Checkout ──────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Step 2: Install jq ───────────────────────────
      - name: "📦 Install jq"
        run: sudo apt-get install -y -qq jq

      # ── Step 3: Check & Send ──────────────────────────
      - name: "📤 Check Status & Send Files"
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: main
        run: |
          #!/bin/bash
          echo "════════════════════════════════════════"
          echo "🔍 Checking for user: $CHAT_ID"
          echo "════════════════════════════════════════"
          
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="main"
          
          FOUND=false
          
          if [ ! -d "videos" ]; then
            echo "ℹ️ No videos directory found."
            FOUND=false
          else
            for FOLDER in videos/*/; do
              [ -d "$FOLDER" ] || continue
              FOLDER_NAME=$(basename "$FOLDER")
              STATUS_FILE="$FOLDER/status.json"
              
              if [ ! -f "$STATUS_FILE" ]; then
                continue
              fi
              
              STATUS=$(jq -r '.status // "unknown"' "$STATUS_FILE" 2>/dev/null)
              CHAT=$(jq -r '.chat_id // ""' "$STATUS_FILE" 2>/dev/null)
              
              echo "  📁 $FOLDER_NAME → Status: $STATUS | Chat: $CHAT"
              
              if [ "$STATUS" = "ready" ] && [ "$CHAT" = "$CHAT_ID" ]; then
                echo "  ✅ Found ready folder for this user!"
                FOUND=true
                
                # پیدا کردن فایل‌ها
                FILES=$(find "$FOLDER" -type f ! -name "status.json" ! -name "README.md" ! -name "thumbnail.jpg" ! -name "subtitle.zip" ! -name "*.jpg" | sort)
                FILE_COUNT=$(echo "$FILES" | grep -c "." 2>/dev/null || echo 0)
                
                if [ "$FILE_COUNT" -eq 0 ]; then
                  FILES=$(find "$FOLDER" -type f ! -name "status.json" ! -name "README.md" | sort)
                  FILE_COUNT=$(echo "$FILES" | grep -c "." 2>/dev/null || echo 0)
                fi
                
                echo "  📦 Found $FILE_COUNT file(s)"
                
                # ساخت JSON برای دکمه‌ها
                INLINE_KEYBOARD='{"inline_keyboard":[]}'
                
                if [ "$FILE_COUNT" -eq 1 ]; then
                  FILE_PATH=$(echo "$FILES" | head -1)
                  RELATIVE_PATH="${FILE_PATH#videos/}"
                  RAW_URL="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${RELATIVE_PATH}"
                  
                  INLINE_KEYBOARD='{"inline_keyboard":[[{"text":"📥 دانلود فایل","url":"'"$RAW_URL"'"}]]}'
                  
                elif [ "$FILE_COUNT" -gt 1 ]; then
                  PART=1
                  KEYBOARD_ROW=""
                  
                  while IFS= read -r FILE_PATH; do
                    RELATIVE_PATH="${FILE_PATH#videos/}"
                    RAW_URL="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${RELATIVE_PATH}"
                    
                    if [ $PART -eq 1 ]; then
                      KEYBOARD_ROW='[{"text":"📦 پارت 1","url":"'"$RAW_URL"'"}'
                    else
                      KEYBOARD_ROW+=',{"text":"📦 پارت '"$PART"'","url":"'"$RAW_URL"'"}'
                    fi
                    
                    PART=$((PART + 1))
                  done <<< "$FILES"
                  
                  KEYBOARD_ROW+=']'
                  INLINE_KEYBOARD='{"inline_keyboard":['"$KEYBOARD_ROW"']}'
                fi
                
                # ارسال پیام به کاربر
                MESSAGE="✅ *دانلود شما آماده است!*\n\n📁 *پوشه:* \`$FOLDER_NAME\`\n📦 *تعداد فایل:* $FILE_COUNT\n\n"
                
                if [ "$FILE_COUNT" -gt 1 ]; then
                  MESSAGE+="⚠️ فایل به دلیل حجم بالا به $FILE_COUNT بخش تقسیم شده.\n_لطفاً همه بخش‌ها را دانلود کنید._\n\n"
                else
                  MESSAGE+="برای دانلود روی دکمه زیر کلیک کنید:\n\n"
                fi
                
                MESSAGE+="⏱ _لینک‌ها تا ۵ دقیقه معتبر هستند._"
                
                echo "  📤 Sending message to user..."
                
                RESPONSE=$(curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n \
                    --arg chat_id "$CHAT_ID" \
                    --arg text "$MESSAGE" \
                    --arg reply_markup "$INLINE_KEYBOARD" \
                    '{chat_id: $chat_id, text: $text, reply_markup: $reply_markup}')")
                
                echo "  📡 Bale API Response: $(echo $RESPONSE | jq -c '.')"
                
                # به‌روزرسانی status.json به sent
                echo "  📝 Updating status to 'sent'..."
                
                CURRENT_CONTENT=$(cat "$STATUS_FILE")
                NEW_CONTENT=$(echo "$CURRENT_CONTENT" | jq '.status = "sent" | .updated_at = "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"')
                echo "$NEW_CONTENT" > "$STATUS_FILE"
                
                echo "  ✅ Done!"
              fi
            done
          fi
          
          if [ "$FOUND" = false ]; then
            echo "ℹ️ No ready files found for this user."
          fi
          
          echo "════════════════════════════════════════"
          echo "✅ Check completed"
          echo "════════════════════════════════════════"

      # ── Step 4: Commit status changes ─────────────────
      - name: "📤 Commit Status Updates"
        if: success()
        run: |
          if git diff --quiet; then
            echo "ℹ️ No status changes to commit."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/*/status.json 2>/dev/null || true
          git commit -m "📝 Update status to sent [skip ci]" --quiet || true
          git push origin main --quiet || echo "⚠️ Push failed (non-critical)"
          echo "✅ Status changes committed."
