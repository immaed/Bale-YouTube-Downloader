# ============================================================
# yt-search.yml — Bale YouTube Search Engine V6 (Final)
# جستجوی کامل با تمام جزئیات + تاریخ شمسی + دکمه دانلود
# بدون --flat-playlist برای دریافت اطلاعات کامل
# ============================================================

name: "🔍 YouTube Search"

on:
  workflow_dispatch:
    inputs:
      query:
        description: "عبارت جستجو"
        required: true
        type: string
      chat_id:
        description: "شناسه کاربر"
        required: true
        type: string
      max_results:
        description: "تعداد نتایج (۱ تا ۱۰)"
        required: false
        type: string
        default: "5"

jobs:
  search:
    name: "🔎 Search & Display"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read

    steps:
      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip jq curl bc
          pip3 install --upgrade yt-dlp --quiet

      - name: "🔍 Search & Send Results"
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          #!/bin/bash
          set +e
          
          QUERY="${{ github.event.inputs.query }}"
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          MAX_RESULTS="${{ github.event.inputs.max_results }}"
          BOT_TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          
          # ══════════════════════════════════════════════
          # توابع کمکی
          # ══════════════════════════════════════════════
          
          send_message() {
            local text="$1"
            local reply_markup="${2:-}"
            
            if [ -n "$reply_markup" ]; then
              jq -n \
                --arg chat_id "$CHAT_ID" \
                --arg text "$text" \
                --argjson reply_markup "$reply_markup" \
                '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", reply_markup: $reply_markup}' \
                > /tmp/payload.json
            else
              jq -n \
                --arg chat_id "$CHAT_ID" \
                --arg text "$text" \
                '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}' \
                > /tmp/payload.json
            fi
            
            curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json > /dev/null 2>&1
          }
          
          # ⭐ فرمت اعداد بزرگ
          format_number() {
            local num=$1
            if [ -z "$num" ] || [ "$num" = "null" ] || [ "$num" -eq 0 ] 2>/dev/null; then
              echo "نامشخص"
            elif [ "$num" -gt 1000000000 ] 2>/dev/null; then
              echo "scale=1; $num / 1000000000" | bc 2>/dev/null | sed 's/\.0$//'
              echo " میلیارد"
            elif [ "$num" -gt 1000000 ] 2>/dev/null; then
              echo "scale=1; $num / 1000000" | bc 2>/dev/null | sed 's/\.0$//'
              echo " میلیون"
            elif [ "$num" -gt 1000 ] 2>/dev/null; then
              echo "scale=1; $num / 1000" | bc 2>/dev/null | sed 's/\.0$//'
              echo " هزار"
            else
              echo "$num"
            fi
          }
          
          # ⭐ تبدیل تاریخ میلادی به شمسی (تقریبی)
          gregorian_to_jalali() {
            local date_str="$1"
            if [ -z "$date_str" ] || [ ${#date_str} -ne 8 ]; then
              echo "نامشخص"
              return
            fi
            
            local year=${date_str:0:4}
            local month=${date_str:4:2}
            local day=${date_str:6:2}
            
            # محاسبه تقریبی (اختلاف ثابت)
            local gy=$((year - 621))
            local gm=$month
            local gd=$day
            
            # اگر ماه میلادی از ۳ بیشتره (مارس)
            if [ "$gm" -gt 3 ]; then
              echo "${gy}/$((gm - 3))/$gd (شمسی)"
            elif [ "$gm" -eq 3 ] && [ "$gd" -ge 21 ]; then
              echo "${gy}/1/$((gd - 20)) (شمسی)"
            elif [ "$gm" -eq 3 ]; then
              echo "$((gy - 1))/12/$((gd + 10)) (شمسی)"
            elif [ "$gm" -eq 2 ]; then
              echo "$((gy - 1))/11/$((gd + 10)) (شمسی)"
            else
              echo "$((gy - 1))/10/$((gd + 11)) (شمسی)"
            fi
          }
          
          # ══════════════════════════════════════════════
          # مرحله ۱: پیام "در حال جستجو"
          # ══════════════════════════════════════════════
          send_message "🔍 *در حال جستجو...*

          ▫️ عبارت: \`${QUERY}\`
          ▫️ در حال بررسی ${MAX_RESULTS} نتیجه برتر

          ⏳ _لطفاً چند لحظه صبر کنید..._"
          
          # ══════════════════════════════════════════════
          # مرحله ۲: اجرای جستجو (دو مرحله‌ای)
          # ══════════════════════════════════════════════
          
          # مرحله ۲-الف: جستجوی سریع برای گرفتن ID ها
          IDS_FILE="/tmp/video_ids.txt"
          
          yt-dlp \
            "ytsearch${MAX_RESULTS}:${QUERY}" \
            --get-id \
            --no-playlist \
            --no-check-certificates \
            --skip-download \
            --flat-playlist \
            2>/dev/null > "$IDS_FILE" || true
          
          IDS_COUNT=$(wc -l < "$IDS_FILE" 2>/dev/null || echo 0)
          
          if [ "$IDS_COUNT" -eq 0 ]; then
            send_message "❌ *نتیجه‌ای یافت نشد!*

          برای عبارت: \`${QUERY}\`
          هیچ ویدیویی پیدا نکردم.

          💡 _لطفاً عبارت دیگری را امتحان کنید._"
            exit 0
          fi
          
          echo "✅ Found $IDS_COUNT video IDs, fetching full details..."
          
          # مرحله ۲-ب: گرفتن اطلاعات کامل برای هر ID
          RESULTS_FILE="/tmp/search_results.json"
          > "$RESULTS_FILE"  # خالی کردن فایل
          
          SUCCESS_COUNT=0
          while IFS= read -r video_id; do
            [ -z "$video_id" ] && continue
            
            echo "  📥 Fetching details for: $video_id"
            
            # ⭐ با timeout 15 ثانیه برای هر ویدیو
            timeout 15 yt-dlp \
              "https://www.youtube.com/watch?v=${video_id}" \
              --dump-json \
              --no-playlist \
              --no-check-certificates \
              --skip-download \
              2>/dev/null >> "$RESULTS_FILE" || echo "  ⚠️ Timeout for $video_id"
            
            SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            
          done < "$IDS_FILE"
          
          RESULT_COUNT=$(wc -l < "$RESULTS_FILE" 2>/dev/null || echo 0)
          
          if [ "$RESULT_COUNT" -eq 0 ]; then
            send_message "❌ *خطا در دریافت اطلاعات!*

          نتایج پیدا شد ولی اطلاعات کامل قابل دریافت نبود.

          💡 _لطفاً دوباره تلاش کنید._"
            exit 0
          fi
          
          echo "✅ Successfully fetched $RESULT_COUNT full results."
          
          # ══════════════════════════════════════════════
          # مرحله ۳: ساخت پیام اصلی
          # ══════════════════════════════════════════════
          
          HEADER="🔍 *نتایج جستجو*

          ▫️ *عبارت:* \`${QUERY}\`
          ▫️ *تعداد نتایج:* ${RESULT_COUNT} ویدیو

          ━━━━━━━━━━━━━━━━━━━━━

          "
          
          BODY=""
          LINE_NUM=0
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LINE_NUM=$((LINE_NUM + 1))
            
            # ⭐ استخراج تمام فیلدها
            TITLE=$(echo "$line" | jq -r '.title // "بدون عنوان"')
            VIDEO_ID=$(echo "$line" | jq -r '.id // .display_id // ""')
            VIDEO_URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            CHANNEL=$(echo "$line" | jq -r '.channel // .uploader // "نامشخص"')
            CHANNEL_URL=$(echo "$line" | jq -r '.channel_url // ""')
            
            # ⭐ آمار
            VIEW_COUNT=$(echo "$line" | jq -r '.view_count // 0')
            LIKE_COUNT=$(echo "$line" | jq -r '.like_count // 0')
            COMMENT_COUNT=$(echo "$line" | jq -r '.comment_count // 0')
            
            # ⭐ اطلاعات کانال
            SUBS=$(echo "$line" | jq -r '.channel_follower_count // 0')
            
            # ⭐ زمان
            DURATION=$(echo "$line" | jq -r '.duration // 0')
            UPLOAD_DATE=$(echo "$line" | jq -r '.upload_date // ""')
            
            # ⭐ کیفیت و حجم
            AGE_LIMIT=$(echo "$line" | jq -r '.age_limit // 0')
            IS_LIVE=$(echo "$line" | jq -r '.is_live // false')
            
            # ⭐ دسته‌بندی
            CATEGORIES=$(echo "$line" | jq -r '.categories // [] | join(", ")')
            TAGS=$(echo "$line" | jq -r '.tags // [] | .[:3] | join(", ")')
            
            # ⭐ فرمت‌ها
            VIEW_COUNT_FORMATTED=$(format_number $VIEW_COUNT)
            LIKE_COUNT_FORMATTED=$(format_number $LIKE_COUNT)
            SUBS_FORMATTED=$(format_number $SUBS)
            
            # فرمت duration
            if [ "$IS_LIVE" = "true" ]; then
              DURATION_FORMATTED="🔴 پخش زنده"
            elif [ "$DURATION" -gt 0 ] 2>/dev/null; then
              M=$((DURATION / 60))
              S=$((DURATION % 60))
              DURATION_FORMATTED="${M}:$(printf '%02d' $S)"
            else
              DURATION_FORMATTED="نامشخص"
            fi
            
            # تاریخ شمسی
            JALALI_DATE=$(gregorian_to_jalali "$UPLOAD_DATE")
            
            # ⭐ آیکون شماره
            case $LINE_NUM in
              1) NUM_ICON="1️⃣" ;;
              2) NUM_ICON="2️⃣" ;;
              3) NUM_ICON="3️⃣" ;;
              4) NUM_ICON="4️⃣" ;;
              5) NUM_ICON="5️⃣" ;;
              6) NUM_ICON="6️⃣" ;;
              7) NUM_ICON="7️⃣" ;;
              8) NUM_ICON="8️⃣" ;;
              9) NUM_ICON="9️⃣" ;;
              10) NUM_ICON="🔟" ;;
              *) NUM_ICON="${LINE_NUM}." ;;
            esac
            
            # ⭐ ساخت هر آیتم
            BODY+="${NUM_ICON} *${TITLE}*
            🔗 [مشاهده در یوتیوب](${VIDEO_URL})
            👤 کانال: ${CHANNEL}"

            # ⭐ سابسکرایبر (اگر موجود باشد)
            if [ "$SUBS" -gt 0 ] 2>/dev/null; then
              BODY+="
            👥 سابسکرایبر: ${SUBS_FORMATTED}"
            fi

            # ⭐ آمار
            BODY+="
            ⏱ مدت: ${DURATION_FORMATTED}"

            if [ "$IS_LIVE" != "true" ]; then
              BODY+="
            👁 بازدید: ${VIEW_COUNT_FORMATTED}"
            fi
            
            if [ "$LIKE_COUNT" -gt 0 ] 2>/dev/null; then
              BODY+="
            👍 لایک: ${LIKE_COUNT_FORMATTED}"
            fi
            
            # ⭐ تاریخ
            if [ -n "$UPLOAD_DATE" ]; then
              BODY+="
            📅 تاریخ: ${JALALI_DATE}"
            fi

            # ⭐ دسته‌بندی (اگر موجود باشد)
            if [ -n "$CATEGORIES" ] && [ "$CATEGORIES" != "[]" ]; then
              BODY+="
            📂 دسته: ${CATEGORIES}"
            fi

            # ⭐ رده سنی
            if [ "$AGE_LIMIT" -gt 0 ] 2>/dev/null; then
              BODY+="
            🔞 رده سنی: +${AGE_LIMIT}"
            fi

            BODY+="

          "
            
          done < "$RESULTS_FILE"
          
          FOOTER="━━━━━━━━━━━━━━━━━━━━━

          👇 *برای دانلود هر ویدیو، روی دکمه آن کلیک کنید.*"
          
          FULL_MESSAGE="${HEADER}${BODY}${FOOTER}"
          
          # ══════════════════════════════════════════════
          # مرحله ۴: ساخت دکمه‌های callback برای دانلود
          # ══════════════════════════════════════════════
          
          INLINE_KEYBOARD='{"inline_keyboard":['
          
          LINE_NUM=0
          FIRST=true
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LINE_NUM=$((LINE_NUM + 1))
            
            VIDEO_ID=$(echo "$line" | jq -r '.id // .display_id // ""')
            TITLE=$(echo "$line" | jq -r '.title // "بدون عنوان"')
            
            if [ ${#TITLE} -gt 30 ]; then
              BTN_TITLE="${TITLE:0:27}..."
            else
              BTN_TITLE="$TITLE"
            fi
            
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              INLINE_KEYBOARD+=','
            fi
            
            INLINE_KEYBOARD+='[{"text":"📥 '"${BTN_TITLE}"'","callback_data":"dl_'${VIDEO_ID}'"}]'
            
          done < "$RESULTS_FILE"
          
          INLINE_KEYBOARD+=']}'
          
          # ══════════════════════════════════════════════
          # مرحله ۵: ارسال پیام نهایی
          # ══════════════════════════════════════════════
          
          send_message "$FULL_MESSAGE" "$INLINE_KEYBOARD"
          
          echo "✅ Search complete. ${RESULT_COUNT} results sent."
