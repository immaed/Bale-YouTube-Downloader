# ============================================================
# yt-search.yml — Bale YouTube Search Engine V7 (Stable)
# جستجوی سریع و پایدار با flat-playlist
# تمام فیلدهای قابل دسترس + فرمت تمیز
# ============================================================

name: "🔍 YouTube Search"

on:
  workflow_dispatch:
    inputs:
      query:
        description: "عبارت جستجو"
        required: true
        type: string
      chat_id:
        description: "شناسه کاربر"
        required: true
        type: string
      max_results:
        description: "تعداد نتایج (۱ تا ۱۰)"
        required: false
        type: string
        default: "5"

jobs:
  search:
    name: "🔎 Search & Display"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip jq curl bc
          pip3 install --upgrade yt-dlp --quiet

      - name: "🔍 Search & Send Results"
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          #!/bin/bash
          set +e
          
          QUERY="${{ github.event.inputs.query }}"
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          MAX_RESULTS="${{ github.event.inputs.max_results }}"
          BOT_TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          
          # ══════════════════════════════════════════════
          # تابع ارسال پیام
          # ══════════════════════════════════════════════
          send_message() {
            local text="$1"
            local reply_markup="${2:-}"
            
            if [ -n "$reply_markup" ]; then
              jq -n \
                --arg chat_id "$CHAT_ID" \
                --arg text "$text" \
                --argjson reply_markup "$reply_markup" \
                '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", reply_markup: $reply_markup}' \
                > /tmp/payload.json
            else
              jq -n \
                --arg chat_id "$CHAT_ID" \
                --arg text "$text" \
                '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}' \
                > /tmp/payload.json
            fi
            
            curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json > /dev/null 2>&1
          }
          
          # ⭐ فرمت اعداد بزرگ
          format_number() {
            local num=$1
            if [ -z "$num" ] || [ "$num" = "null" ] || [ "$num" = "0" ] || [ "$num" -eq 0 ] 2>/dev/null; then
              echo ""
              return
            fi
            
            if [ "$num" -gt 1000000000 ] 2>/dev/null; then
              local val=$(echo "scale=1; $num / 1000000000" | bc 2>/dev/null)
              echo "${val} میلیارد"
            elif [ "$num" -gt 1000000 ] 2>/dev/null; then
              local val=$(echo "scale=1; $num / 1000000" | bc 2>/dev/null)
              echo "${val} میلیون"
            elif [ "$num" -gt 1000 ] 2>/dev/null; then
              local val=$(echo "scale=1; $num / 1000" | bc 2>/dev/null)
              echo "${val} هزار"
            else
              echo "${num}"
            fi
          }
          
          # ══════════════════════════════════════════════
          # مرحله ۱: پیام "در حال جستجو"
          # ══════════════════════════════════════════════
          send_message "🔍 *در حال جستجو...*

          ▫️ عبارت: \`${QUERY}\`
          ▫️ در حال بررسی ${MAX_RESULTS} نتیجه برتر

          ⏳ _لطفاً چند لحظه صبر کنید..._"
          
          # ══════════════════════════════════════════════
          # مرحله ۲: اجرای جستجو
          # ══════════════════════════════════════════════
          RESULTS_FILE="/tmp/search_results.json"
          
          yt-dlp \
            "ytsearch${MAX_RESULTS}:${QUERY}" \
            --dump-json \
            --no-playlist \
            --no-check-certificates \
            --skip-download \
            --flat-playlist \
            2>/dev/null > "$RESULTS_FILE" || true
          
          RESULT_COUNT=$(wc -l < "$RESULTS_FILE" 2>/dev/null || echo 0)
          
          if [ "$RESULT_COUNT" -eq 0 ]; then
            send_message "❌ *نتیجه‌ای یافت نشد!*

          برای عبارت: \`${QUERY}\`
          هیچ ویدیویی پیدا نکردم.

          💡 _لطفاً عبارت دیگری را امتحان کنید یا املای کلمات را بررسی کنید._"
            exit 0
          fi
          
          echo "✅ Found $RESULT_COUNT results."
          
          # ══════════════════════════════════════════════
          # مرحله ۳: ساخت پیام اصلی
          # ══════════════════════════════════════════════
          
          HEADER="🔍 *نتایج جستجو*

          ▫️ *عبارت:* \`${QUERY}\`
          ▫️ *تعداد نتایج:* ${RESULT_COUNT} ویدیو

          ━━━━━━━━━━━━━━━━━━━━━

          "
          
          BODY=""
          LINE_NUM=0
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LINE_NUM=$((LINE_NUM + 1))
            
            # ⭐ استخراج فیلدهای در دسترس با flat-playlist
            TITLE=$(echo "$line" | jq -r '.title // "بدون عنوان"')
            VIDEO_ID=$(echo "$line" | jq -r '.id // .display_id // ""')
            VIDEO_URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            CHANNEL=$(echo "$line" | jq -r '.channel // .uploader // "نامشخص"')
            VIEW_COUNT=$(echo "$line" | jq -r '.view_count // 0')
            DURATION=$(echo "$line" | jq -r '.duration // 0')
            UPLOAD_DATE=$(echo "$line" | jq -r '.upload_date // ""')
            DESCRIPTION=$(echo "$line" | jq -r '.description // ""')
            
            # ⭐ فرمت بازدید
            VIEW_COUNT_FORMATTED=$(format_number $VIEW_COUNT)
            
            # ⭐ فرمت مدت زمان
            if [ "$DURATION" -gt 0 ] 2>/dev/null; then
              M=$((DURATION / 60))
              S=$((DURATION % 60))
              DURATION_FORMATTED="${M}:$(printf '%02d' $S)"
            else
              DURATION_FORMATTED=""
            fi
            
            # ⭐ فرمت تاریخ (نمایش ساده میلادی)
            if [ -n "$UPLOAD_DATE" ] && [ ${#UPLOAD_DATE} -eq 8 ]; then
              Y=${UPLOAD_DATE:0:4}
              M=${UPLOAD_DATE:4:2}
              D=${UPLOAD_DATE:6:2}
              UPLOAD_FORMATTED="${Y}/${M}/${D}"
            else
              UPLOAD_FORMATTED=""
            fi
            
            # ⭐ توضیحات (۱۲۰ کاراکتر اول)
            if [ -n "$DESCRIPTION" ] && [ "$DESCRIPTION" != "null" ]; then
              DESC_SHORT=$(echo "$DESCRIPTION" | head -1 | cut -c1-120)
              if [ ${#DESCRIPTION} -gt 120 ]; then
                DESC_SHORT="${DESC_SHORT}..."
              fi
            else
              DESC_SHORT=""
            fi
            
            # ⭐ آیکون شماره
            case $LINE_NUM in
              1) NUM_ICON="1️⃣" ;;
              2) NUM_ICON="2️⃣" ;;
              3) NUM_ICON="3️⃣" ;;
              4) NUM_ICON="4️⃣" ;;
              5) NUM_ICON="5️⃣" ;;
              6) NUM_ICON="6️⃣" ;;
              7) NUM_ICON="7️⃣" ;;
              8) NUM_ICON="8️⃣" ;;
              9) NUM_ICON="9️⃣" ;;
              10) NUM_ICON="🔟" ;;
              *) NUM_ICON="${LINE_NUM}." ;;
            esac
            
            # ⭐ ساخت هر آیتم
            BODY+="${NUM_ICON} *${TITLE}*"
            
            # توضیحات (اگر موجود باشد)
            if [ -n "$DESC_SHORT" ]; then
              BODY+="
            📝 ${DESC_SHORT}"
            fi
            
            BODY+="
            🔗 [مشاهده در یوتیوب](${VIDEO_URL})
            👤 کانال: ${CHANNEL}"
            
            # مدت زمان (اگر موجود باشد)
            if [ -n "$DURATION_FORMATTED" ]; then
              BODY+="
            ⏱ مدت: ${DURATION_FORMATTED}"
            fi
            
            # بازدید (اگر موجود باشد)
            if [ -n "$VIEW_COUNT_FORMATTED" ]; then
              BODY+="
            👁 بازدید: ${VIEW_COUNT_FORMATTED}"
            fi
            
            # تاریخ (اگر موجود باشد)
            if [ -n "$UPLOAD_FORMATTED" ]; then
              BODY+="
            📅 تاریخ: ${UPLOAD_FORMATTED}"
            fi

            BODY+="

          "
            
          done < "$RESULTS_FILE"
          
          FOOTER="━━━━━━━━━━━━━━━━━━━━━

          👇 *برای دانلود هر ویدیو، روی دکمه آن کلیک کنید.*

          💡 _با ارسال دوباره عبارت، جستجوی جدید انجام دهید._"
          
          FULL_MESSAGE="${HEADER}${BODY}${FOOTER}"
          
          # ══════════════════════════════════════════════
          # مرحله ۴: ساخت دکمه‌های دانلود
          # ══════════════════════════════════════════════
          
          INLINE_KEYBOARD='{"inline_keyboard":['
          
          LINE_NUM=0
          FIRST=true
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LINE_NUM=$((LINE_NUM + 1))
            
            VIDEO_ID=$(echo "$line" | jq -r '.id // .display_id // ""')
            TITLE=$(echo "$line" | jq -r '.title // "بدون عنوان"')
            
            # ⭐ عنوان کوتاه برای دکمه (۳۰ کاراکتر)
            if [ ${#TITLE} -gt 30 ]; then
              BTN_TITLE="${TITLE:0:27}..."
            else
              BTN_TITLE="$TITLE"
            fi
            
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              INLINE_KEYBOARD+=','
            fi
            
            # ⭐ هر دکمه یه ردیف جداگونه با callback_data
            INLINE_KEYBOARD+='[{"text":"📥 '"${BTN_TITLE}"'","callback_data":"dl_'${VIDEO_ID}'"}]'
            
          done < "$RESULTS_FILE"
          
          INLINE_KEYBOARD+=']}'
          
          # ══════════════════════════════════════════════
          # مرحله ۵: ارسال پیام نهایی
          # ══════════════════════════════════════════════
          
          send_message "$FULL_MESSAGE" "$INLINE_KEYBOARD"
          
          echo "✅ Search complete. ${RESULT_COUNT} results sent."
