# ============================================================
# yt-search.yml — Bale YouTube Search Engine V3
# خروجی نهایی با فرمت صحیح Markdown
# رفع مشکل \n و duration، دکمه‌های کوتاه
# ============================================================

name: "🔍 YouTube Search"

on:
  workflow_dispatch:
    inputs:
      query:
        description: "عبارت جستجو"
        required: true
        type: string
      chat_id:
        description: "شناسه کاربر"
        required: true
        type: string
      max_results:
        description: "تعداد نتایج"
        required: false
        type: string
        default: "5"

jobs:
  search:
    name: "🔎 Search & Display"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip jq curl bc
          pip3 install --upgrade yt-dlp --quiet

      - name: "🔍 Search & Send Results"
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          #!/bin/bash
          set +e
          
          QUERY="${{ github.event.inputs.query }}"
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          MAX_RESULTS="${{ github.event.inputs.max_results }}"
          BOT_TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          
          # ══════════════════════════════════════════════
          # تابع ارسال پیام
          # ══════════════════════════════════════════════
          send_message() {
            local text="$1"
            local reply_markup="${2:-}"
            
            # نوشتن payload در فایل برای حفظ newline‌های واقعی
            if [ -n "$reply_markup" ]; then
              jq -n \
                --arg chat_id "$CHAT_ID" \
                --arg text "$text" \
                --argjson reply_markup "$reply_markup" \
                '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", reply_markup: $reply_markup}' \
                > /tmp/payload.json
            else
              jq -n \
                --arg chat_id "$CHAT_ID" \
                --arg text "$text" \
                '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}' \
                > /tmp/payload.json
            fi
            
            curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json > /dev/null 2>&1
          }
          
          # ══════════════════════════════════════════════
          # مرحله ۱: پیام "در حال جستجو"
          # ══════════════════════════════════════════════
          send_message "🔍 *در حال جستجو...*

          ▫️ عبارت: \`${QUERY}\`
          ▫️ در حال بررسی ${MAX_RESULTS} نتیجه برتر

          ⏳ _لطفاً چند لحظه صبر کنید..._"
          
          # ══════════════════════════════════════════════
          # مرحله ۲: اجرای جستجو
          # ══════════════════════════════════════════════
          RESULTS_FILE="/tmp/search_results.json"
          
          yt-dlp \
            "ytsearch${MAX_RESULTS}:${QUERY}" \
            --dump-json \
            --no-playlist \
            --no-check-certificates \
            --skip-download \
            --flat-playlist \
            2>/dev/null > "$RESULTS_FILE" || true
          
          RESULT_COUNT=$(wc -l < "$RESULTS_FILE" 2>/dev/null || echo 0)
          
          if [ "$RESULT_COUNT" -eq 0 ]; then
            send_message "❌ *نتیجه‌ای یافت نشد!*

          برای عبارت: \`${QUERY}\`
          هیچ ویدیویی پیدا نکردم.

          💡 _لطفاً عبارت دیگری را امتحان کنید._"
            exit 0
          fi
          
          # ══════════════════════════════════════════════
          # مرحله ۳: ساخت پیام اصلی
          # ══════════════════════════════════════════════
          
          # ⭐ هدر
          HEADER="🔍 *نتایج جستجو*

          ▫️ *عبارت:* \`${QUERY}\`
          ▫️ *تعداد نتایج:* ${RESULT_COUNT} ویدیو

          ━━━━━━━━━━━━━━━━━━━━━

          "
          
          # ⭐ ساخت لیست نتایج
          BODY=""
          LINE_NUM=0
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LINE_NUM=$((LINE_NUM + 1))
            
            TITLE=$(echo "$line" | jq -r '.title // "بدون عنوان"')
            VIDEO_ID=$(echo "$line" | jq -r '.id // .display_id // ""')
            DURATION=$(echo "$line" | jq -r '.duration // 0')
            CHANNEL=$(echo "$line" | jq -r '.channel // .uploader // "نامشخص"')
            VIEW_COUNT=$(echo "$line" | jq -r '.view_count // 0')
            
            # ⭐ فرمت duration
            if [ "$DURATION" -gt 0 ] 2>/dev/null; then
              MINUTES=$((DURATION / 60))
              SECONDS=$((DURATION % 60))
              DURATION_FORMATTED="${MINUTES}:$(printf '%02d' $SECONDS)"
            else
              DURATION_FORMATTED="زنده"
            fi
            
            # ⭐ فرمت view count
            if [ "$VIEW_COUNT" -gt 1000000000 ] 2>/dev/null; then
              VIEWS=$(echo "scale=1; $VIEW_COUNT / 1000000000" | bc 2>/dev/null || echo "?")
              VIEW_COUNT_FORMATTED="${VIEWS} میلیارد"
            elif [ "$VIEW_COUNT" -gt 1000000 ] 2>/dev/null; then
              VIEWS=$(echo "scale=1; $VIEW_COUNT / 1000000" | bc 2>/dev/null || echo "?")
              VIEW_COUNT_FORMATTED="${VIEWS} میلیون"
            elif [ "$VIEW_COUNT" -gt 1000 ] 2>/dev/null; then
              VIEWS=$(echo "scale=1; $VIEW_COUNT / 1000" | bc 2>/dev/null || echo "?")
              VIEW_COUNT_FORMATTED="${VIEWS} هزار"
            else
              VIEW_COUNT_FORMATTED="${VIEW_COUNT}"
            fi
            
            # ⭐ آیکون شماره
            case $LINE_NUM in
              1) NUM_ICON="1️⃣" ;;
              2) NUM_ICON="2️⃣" ;;
              3) NUM_ICON="3️⃣" ;;
              4) NUM_ICON="4️⃣" ;;
              5) NUM_ICON="5️⃣" ;;
              *) NUM_ICON="${LINE_NUM}." ;;
            esac
            
            # ⭐ عنوان کوتاه شده
            if [ ${#TITLE} -gt 55 ]; then
              DISPLAY_TITLE="${TITLE:0:52}..."
            else
              DISPLAY_TITLE="$TITLE"
            fi
            
            # ⭐ ساخت هر آیتم
            BODY+="${NUM_ICON} *${DISPLAY_TITLE}*
               👤 ${CHANNEL}
               ⏱ ${DURATION_FORMATTED}  |  👁 ${VIEW_COUNT_FORMATTED}

          "
            
          done < "$RESULTS_FILE"
          
          # ⭐ فوتر
          FOOTER="━━━━━━━━━━━━━━━━━━━━━

          👇 *برای دانلود، روی دکمه زیر کلیک کنید.*

          💡 _با ارسال دوباره عبارت، جستجوی جدید انجام دهید._"
          
          # ⭐ پیام کامل
          FULL_MESSAGE="${HEADER}${BODY}${FOOTER}"
          
          # ══════════════════════════════════════════════
          # مرحله ۴: ساخت دکمه‌های دانلود
          # ══════════════════════════════════════════════
          
          INLINE_KEYBOARD='{"inline_keyboard":['
          
          LINE_NUM=0
          FIRST=true
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LINE_NUM=$((LINE_NUM + 1))
            
            VIDEO_ID=$(echo "$line" | jq -r '.id // .display_id // ""')
            TITLE=$(echo "$line" | jq -r '.title // "بدون عنوان"')
            
            # ⭐ عنوان کوتاه برای دکمه (حداکثر ۳۰ کاراکتر)
            if [ ${#TITLE} -gt 30 ]; then
              BTN_TITLE="${TITLE:0:27}..."
            else
              BTN_TITLE="$TITLE"
            fi
            
            VIDEO_URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              INLINE_KEYBOARD+=','
            fi
            
            # ⭐ هر دکمه یه ردیف جداگونه
            INLINE_KEYBOARD+='[{"text":"📥 '"${LINE_NUM}"'. '"${BTN_TITLE}"'","url":"'"${VIDEO_URL}"'"}]'
            
          done < "$RESULTS_FILE"
          
          INLINE_KEYBOARD+=']}'
          
          # ══════════════════════════════════════════════
          # مرحله ۵: ارسال پیام نهایی
          # ══════════════════════════════════════════════
          
          send_message "$FULL_MESSAGE" "$INLINE_KEYBOARD"
          
          echo "✅ Search complete. ${RESULT_COUNT} results sent."
