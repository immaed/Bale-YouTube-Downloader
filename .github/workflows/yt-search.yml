# ============================================================
# yt-search.yml — Bale YouTube Search Engine V2
# خروجی شکیل و حرفه‌ای با ایموجی و فرمت استاندارد فارسی
# ============================================================

name: "🔍 YouTube Search"

on:
  workflow_dispatch:
    inputs:
      query:
        description: "عبارت جستجو"
        required: true
        type: string
      chat_id:
        description: "شناسه کاربر"
        required: true
        type: string
      max_results:
        description: "تعداد نتایج"
        required: false
        type: string
        default: "5"

jobs:
  search:
    name: "🔎 Search & Display"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip jq curl bc
          pip3 install --upgrade yt-dlp --quiet

      - name: "🔍 Search & Send Results"
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: |
          #!/bin/bash
          set +e
          
          QUERY="${{ github.event.inputs.query }}"
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          MAX_RESULTS="${{ github.event.inputs.max_results }}"
          BOT_TOKEN="${{ secrets.BALE_BOT_TOKEN }}"
          
          # ══════════════════════════════════════════════
          # تابع کمکی برای ارسال پیام
          # ══════════════════════════════════════════════
          send_message() {
            local text="$1"
            local reply_markup="${2:-}"
            
            if [ -n "$reply_markup" ]; then
              curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "$(jq -n \
                  --arg chat_id "$CHAT_ID" \
                  --arg text "$text" \
                  --argjson reply_markup "$reply_markup" \
                  '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", reply_markup: $reply_markup}')" > /dev/null 2>&1
            else
              curl -s -X POST "https://tapi.bale.ai/bot${BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "$(jq -n \
                  --arg chat_id "$CHAT_ID" \
                  --arg text "$text" \
                  '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}')" > /dev/null 2>&1
            fi
          }
          
          # ══════════════════════════════════════════════
          # مرحله ۱: ارسال پیام "در حال جستجو"
          # ══════════════════════════════════════════════
          send_message "🔍 *در حال جستجو...*\n\n▫️ عبارت: \`${QUERY}\`\n▫️ در حال بررسی ${MAX_RESULTS} نتیجه برتر یوتیوب\n\n⏳ _لطفاً چند لحظه صبر کنید..._"
          
          # ══════════════════════════════════════════════
          # مرحله ۲: اجرای جستجو
          # ══════════════════════════════════════════════
          RESULTS_FILE="/tmp/search_results.json"
          
          yt-dlp \
            "ytsearch${MAX_RESULTS}:${QUERY}" \
            --dump-json \
            --no-playlist \
            --no-check-certificates \
            --skip-download \
            --flat-playlist \
            2>/dev/null > "$RESULTS_FILE" || true
          
          RESULT_COUNT=$(wc -l < "$RESULTS_FILE" 2>/dev/null || echo 0)
          
          if [ "$RESULT_COUNT" -eq 0 ]; then
            send_message "❌ *نتیجه‌ای یافت نشد!*\n\nبرای عبارت: \`${QUERY}\`\nهیچ ویدیویی پیدا نکردم.\n\n💡 _لطفاً عبارت دیگری را امتحان کنید یا املای کلمات را بررسی کنید._"
            exit 0
          fi
          
          # ══════════════════════════════════════════════
          # مرحله ۳: ساخت پیام اصلی نتایج
          # ══════════════════════════════════════════════
          
          # ⭐ هدر
          HEADER="🔍 *نتایج جستجو*\n\n"
          HEADER+="▫️ *عبارت:* \`${QUERY}\`\n"
          HEADER+="▫️ *تعداد نتایج:* ${RESULT_COUNT} ویدیو\n\n"
          HEADER+="━━━━━━━━━━━━━━━━━━━━━\n\n"
          
          # ⭐ ساخت لیست نتایج برای نمایش
          BODY=""
          LINE_NUM=0
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LINE_NUM=$((LINE_NUM + 1))
            
            TITLE=$(echo "$line" | jq -r '.title // "بدون عنوان"')
            VIDEO_ID=$(echo "$line" | jq -r '.id // .display_id // ""')
            DURATION=$(echo "$line" | jq -r '.duration // 0')
            CHANNEL=$(echo "$line" | jq -r '.channel // .uploader // "نامشخص"')
            VIEW_COUNT=$(echo "$line" | jq -r '.view_count // 0')
            
            # ⭐ فرمت duration
            if [ "$DURATION" -gt 0 ] 2>/dev/null; then
              MINUTES=$((DURATION / 60))
              SECONDS=$((DURATION % 60))
              DURATION_FORMATTED="${MINUTES}:$(printf '%02d' $SECONDS)"
            else
              DURATION_FORMATTED="زنده"
            fi
            
            # ⭐ فرمت view count
            if [ "$VIEW_COUNT" -gt 1000000000 ] 2>/dev/null; then
              VIEWS=$(echo "scale=1; $VIEW_COUNT / 1000000000" | bc 2>/dev/null || echo "?")
              VIEW_COUNT_FORMATTED="${VIEWS} میلیارد"
            elif [ "$VIEW_COUNT" -gt 1000000 ] 2>/dev/null; then
              VIEWS=$(echo "scale=1; $VIEW_COUNT / 1000000" | bc 2>/dev/null || echo "?")
              VIEW_COUNT_FORMATTED="${VIEWS} میلیون"
            elif [ "$VIEW_COUNT" -gt 1000 ] 2>/dev/null; then
              VIEWS=$(echo "scale=1; $VIEW_COUNT / 1000" | bc 2>/dev/null || echo "?")
              VIEW_COUNT_FORMATTED="${VIEWS} هزار"
            else
              VIEW_COUNT_FORMATTED="${VIEW_COUNT}"
            fi
            
            # ⭐ آیکون شماره
            case $LINE_NUM in
              1) NUM_ICON="1️⃣" ;;
              2) NUM_ICON="2️⃣" ;;
              3) NUM_ICON="3️⃣" ;;
              4) NUM_ICON="4️⃣" ;;
              5) NUM_ICON="5️⃣" ;;
              *) NUM_ICON="${LINE_NUM}." ;;
            esac
            
            # ⭐ عنوان کوتاه شده (حداکثر ۶۰ کاراکتر)
            if [ ${#TITLE} -gt 60 ]; then
              DISPLAY_TITLE="${TITLE:0:57}..."
            else
              DISPLAY_TITLE="$TITLE"
            fi
            
            # ⭐ ساخت هر آیتم
            BODY+="${NUM_ICON} *${DISPLAY_TITLE}*\n"
            BODY+="   👤 ${CHANNEL}\n"
            BODY+="   ⏱ ${DURATION_FORMATTED}  |  👁 ${VIEW_COUNT_FORMATTED}\n"
            BODY+="   🔗 \`/dl_${VIDEO_ID}\`\n\n"
            
          done < "$RESULTS_FILE"
          
          # ⭐ فوتر
          FOOTER="━━━━━━━━━━━━━━━━━━━━━\n\n"
          FOOTER+="👇 *برای دانلود، روی دکمه زیر هر ویدیو کلیک کنید.*\n\n"
          FOOTER+="💡 _با ارسال دوباره عبارت، جستجوی جدید انجام دهید._"
          
          # ⭐ پیام کامل
          FULL_MESSAGE="${HEADER}${BODY}${FOOTER}"
          
          # ══════════════════════════════════════════════
          # مرحله ۴: ساخت دکمه‌های دانلود
          # ══════════════════════════════════════════════
          
          # ساخت inline_keyboard
          INLINE_KEYBOARD='{"inline_keyboard":['
          
          LINE_NUM=0
          FIRST=true
          
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            LINE_NUM=$((LINE_NUM + 1))
            
            VIDEO_ID=$(echo "$line" | jq -r '.id // .display_id // ""')
            TITLE=$(echo "$line" | jq -r '.title // "بدون عنوان"')
            
            # عنوان کوتاه برای دکمه (حداکثر ۴۰ کاراکتر)
            if [ ${#TITLE} -gt 40 ]; then
              BTN_TITLE="${TITLE:0:37}..."
            else
              BTN_TITLE="$TITLE"
            fi
            
            VIDEO_URL="https://www.youtube.com/watch?v=${VIDEO_ID}"
            
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              INLINE_KEYBOARD+=','
            fi
            
            INLINE_KEYBOARD+='[{"text":"📥 '"${BTN_TITLE}"'","url":"'"${VIDEO_URL}"'"}]'
            
          done < "$RESULTS_FILE"
          
          INLINE_KEYBOARD+=']}'
          
          # ══════════════════════════════════════════════
          # مرحله ۵: ارسال پیام نهایی
          # ══════════════════════════════════════════════
          
          send_message "$FULL_MESSAGE" "$INLINE_KEYBOARD"
          
          echo "✅ Search complete. ${RESULT_COUNT} results sent."
