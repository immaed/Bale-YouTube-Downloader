name: "🧪 Connection Test via WARP"

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # ── راه‌اندازی WARP ──────────────────────────────
      - name: "🌐 Setup Cloudflare WARP"
        run: |
          docker network create warp-net 2>/dev/null || true
          docker run -d \
            --name warp --restart=no --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          sleep 15
          for i in $(seq 1 5); do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then echo "✅ WARP active!"; break; else sleep 5; fi
          done

      # ── تست ۱: مستقیم (همون قبلی، برای مقایسه) ──────
      - name: "Test 1: Direct (No Proxy)"
        run: |
          echo "=== Test 1: Direct curl to khashayar.one ==="
          curl -v --max-time 10 "https://khashayar.one/test-connection.php" 2>&1 || echo "❌ DIRECT FAILED"

      # ── تست ۲: از طریق WARP SOCKS5 ────────────────────
      - name: "Test 2: Via WARP SOCKS5 Proxy"
        run: |
          echo "=== Test 2: curl via WARP SOCKS5 ==="
          curl -v --max-time 15 --socks5-hostname 127.0.0.1:1080 \
            "https://khashayar.one/test-connection.php" 2>&1

      # ── تست ۳: POST با WARP ──────────────────────────
      - name: "Test 3: POST via WARP"
        run: |
          echo "=== Test 3: POST to gateway via WARP ==="
          curl -v --max-time 15 --socks5-hostname 127.0.0.1:1080 \
            -X POST "https://khashayar.one/test-connection.php" \
            -H "Content-Type: application/json" \
            -d '{"test":"hello_from_warp","source":"github_actions"}' 2>&1

      # ── تست ۴: gateway.php واقعی با WARP ──────────────
      - name: "Test 4: Actual gateway.php via WARP"
        run: |
          echo "=== Test 4: POST to gateway.php via WARP ==="
          curl -v --max-time 15 --socks5-hostname 127.0.0.1:1080 \
            -X POST "https://khashayar.one/gateway.php" \
            -H "Content-Type: application/json" \
            -H "X-Gateway-Secret: test_secret_123" \
            -d '{"chat_id":"12345","quality":"1080p","subs":"no","title":"test","files":["https://example.com/test.mp4"]}' 2>&1

      # ── تست ۵: بررسی IP خروجی WARP ───────────────────
      - name: "Test 5: Check WARP Exit IP"
        run: |
          echo "=== Test 5: What IP does WARP exit from? ==="
          curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 \
            "https://ifconfig.me" 2>&1
          echo ""

      # ── پاکسازی ─────────────────────────────────────
      - name: "🛑 Stop WARP"
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true
