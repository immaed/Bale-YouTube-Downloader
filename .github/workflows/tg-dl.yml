# ============================================================
# tg-dl.yml — Bale Telegram Downloader
# V1.0 — warp-cli + Multi-Layer Fallback
# Repository: Bale-YouTube-Downloader
# ============================================================

name: "📥 Telegram Downloader"

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: "🔗 لینک پست یا کانال تلگرام (مثال: https://t.me/channel/123)"
        required: true
        type: string
      content_type:
        description: "📋 نوع محتوا"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - video
          - audio
          - photo
          - document
          - text
      max_items:
        description: "📊 حداکثر تعداد دانلود (۱ تا ۵۰)"
        required: false
        type: string
        default: "10"
      start_from:
        description: "🔄 شروع از پست شماره (۱ = آخرین پست)"
        required: false
        type: string
        default: "1"

env:
  PROJECT_NAME: "Bale Telegram Downloader"
  SPLIT_SIZE_MB: 45

jobs:
  download:
    name: "📥 Download & Store"
    runs-on: ubuntu-latest
    container:
      image: khashayardev/bale-yt-downloader:latest
      options: --privileged
    timeout-minutes: 120
    permissions:
      contents: write
      actions: read

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          filter: blob:none

      - name: "⚙️ Configure Git"
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: "🌐 Setup Connection (warp-cli)"
        run: |
          echo "🔄 Starting warp-cli..."
          warp-cli register 2>/dev/null || true
          warp-cli connect 2>/dev/null || true
          sleep 10
          echo "✅ warp-cli connected (direct mode)"

      - name: "📦 Verify Dependencies"
        run: |
          echo "✅ Pre-installed in Docker image"
          yt-dlp --version
          ffmpeg -version 2>&1 | head -1
          python3 --version
          jq --version

      - name: "🔧 Setup Download Parameters"
        id: setup
        shell: bash
        run: |
          TG_LINK="${{ github.event.inputs.telegram_link }}"
          CONTENT_TYPE="${{ github.event.inputs.content_type }}"
          MAX_ITEMS="${{ github.event.inputs.max_items }}"
          START_FROM="${{ github.event.inputs.start_from }}"
          
          echo "════════════════════════════════════════"
          echo "  $PROJECT_NAME"
          echo "════════════════════════════════════════"
          echo "📊 Link: $TG_LINK"
          echo "📋 Type: $CONTENT_TYPE | Max: $MAX_ITEMS | Start: $START_FROM"
          
          echo "TG_LINK=$TG_LINK" >> $GITHUB_ENV
          echo "CONTENT_TYPE=$CONTENT_TYPE" >> $GITHUB_ENV
          echo "MAX_ITEMS=$MAX_ITEMS" >> $GITHUB_ENV
          echo "START_FROM=$START_FROM" >> $GITHUB_ENV
          echo "BACKUP_DIR=/tmp/tg_downloads_$$" >> $GITHUB_ENV
          
          mkdir -p /tmp/tg_downloads_$$
          echo "✅ Setup complete"

      - name: "⬇️ Download Telegram Content"
        id: download
        shell: bash
        run: |
          #!/bin/bash
          set -e
          
          TG_LINK="${{ env.TG_LINK }}"
          CONTENT_TYPE="${{ env.CONTENT_TYPE }}"
          MAX_ITEMS="${{ env.MAX_ITEMS }}"
          START_FROM="${{ env.START_FROM }}"
          BACKUP_DIR="${{ env.BACKUP_DIR }}"
          
          # ══════════════════════════════════════════════
          # توابع کمکی
          # ══════════════════════════════════════════════
          
          sanitize_name() {
            local name="$1"
            name=$(echo "$name" | LC_ALL=C tr '[:space:]｜　' '---' | LC_ALL=C tr -c 'a-zA-Z0-9_-' '-' | tr -s '-' | sed 's/^-//;s/-$//')
            [ -z "$name" ] && name="content"
            echo "$name"
          }
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          format_size() {
            local size=$1
            if [ "$size" -gt 1048576 ]; then
              echo "$(echo "scale=1; $size/1048576" | bc) MB"
            elif [ "$size" -gt 1024 ]; then
              echo "$(echo "scale=1; $size/1024" | bc) KB"
            else
              echo "${size} B"
            fi
          }
          
          # ══════════════════════════════════════════════
          # تشخیص نوع محتوا از لینک
          # ══════════════════════════════════════════════
          
          # استخراج نام کانال و شماره پست
          CHANNEL_NAME=$(echo "$TG_LINK" | grep -oP 't\.me/\K[^/]+' || echo "unknown")
          POST_ID=$(echo "$TG_LINK" | grep -oP '\d+$' || echo "")
          
          echo "📡 Channel: @$CHANNEL_NAME"
          echo "📝 Post ID: ${POST_ID:-N/A (channel link)}"
          
          # ══════════════════════════════════════════════
          # دانلود مدیا با yt-dlp
          # ══════════════════════════════════════════════
          
          if [ "$CONTENT_TYPE" != "text" ]; then
            echo "🎬 Downloading media with yt-dlp..."
            
            # تنظیم فرمت بر اساس نوع محتوا
            case $CONTENT_TYPE in
              video) YT_FORMAT="bestvideo+bestaudio/best" ;;
              audio) YT_FORMAT="bestaudio/best" ;;
              photo) YT_FORMAT="bestimage" ;;
              document) YT_FORMAT="best" ;;
              *) YT_FORMAT="best" ;;
            esac
            
            # ⭐ ۶ متد دانلود برای تلگرام
            DOWNLOAD_SUCCESS=false
            TMP_DIR="/tmp/tg_tmp_$$"
            mkdir -p "$TMP_DIR"
            
            # Method 1: yt-dlp direct
            echo "  🔄 Method 1: yt-dlp direct..."
            yt-dlp --no-playlist --playlist-items "${START_FROM}-$((START_FROM + MAX_ITEMS - 1))" \
              -f "$YT_FORMAT" -o "${TMP_DIR}/%(title)s.%(ext)s" \
              --no-progress --retries 5 --fragment-retries 5 \
              --no-check-certificates "$TG_LINK" 2>/dev/null && DOWNLOAD_SUCCESS=true
            
            # Method 2: yt-dlp with iOS UA
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "  🔄 Method 2: yt-dlp iOS..."
              yt-dlp --no-playlist --playlist-items "${START_FROM}-$((START_FROM + MAX_ITEMS - 1))" \
                -f "$YT_FORMAT" -o "${TMP_DIR}/%(title)s.%(ext)s" \
                --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X)" \
                --no-progress --retries 5 --no-check-certificates "$TG_LINK" 2>/dev/null && DOWNLOAD_SUCCESS=true
            fi
            
            # Method 3: yt-dlp with cookies (if available)
            if [ "$DOWNLOAD_SUCCESS" = false ] && [ -f /tmp/youtube-cookies.txt ]; then
              echo "  🔄 Method 3: With cookies..."
              yt-dlp --no-playlist --playlist-items "${START_FROM}-$((START_FROM + MAX_ITEMS - 1))" \
                -f "$YT_FORMAT" -o "${TMP_DIR}/%(title)s.%(ext)s" \
                --cookies /tmp/youtube-cookies.txt \
                --no-progress --retries 5 --no-check-certificates "$TG_LINK" 2>/dev/null && DOWNLOAD_SUCCESS=true
            fi
            
            # Method 4: yt-dlp with Android UA
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "  🔄 Method 4: Android UA..."
              yt-dlp --no-playlist --playlist-items "${START_FROM}-$((START_FROM + MAX_ITEMS - 1))" \
                -f "$YT_FORMAT" -o "${TMP_DIR}/%(title)s.%(ext)s" \
                --user-agent "Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36" \
                --no-progress --retries 5 --no-check-certificates "$TG_LINK" 2>/dev/null && DOWNLOAD_SUCCESS=true
            fi
            
            # Method 5: yt-dlp force IPv4
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "  🔄 Method 5: Force IPv4..."
              yt-dlp --no-playlist --playlist-items "${START_FROM}-$((START_FROM + MAX_ITEMS - 1))" \
                -f "$YT_FORMAT" -o "${TMP_DIR}/%(title)s.%(ext)s" \
                --force-ipv4 --no-progress --retries 10 --no-check-certificates "$TG_LINK" 2>/dev/null && DOWNLOAD_SUCCESS=true
            fi
            
            # Method 6: yt-dlp no SSL check
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "  🔄 Method 6: No SSL..."
              yt-dlp --no-playlist --playlist-items "${START_FROM}-$((START_FROM + MAX_ITEMS - 1))" \
                -f "$YT_FORMAT" -o "${TMP_DIR}/%(title)s.%(ext)s" \
                --no-check-certificates --no-progress --retries 10 "$TG_LINK" 2>/dev/null && DOWNLOAD_SUCCESS=true
            fi
            
            if [ "$DOWNLOAD_SUCCESS" = true ]; then
              echo "✅ Media downloaded successfully!"
              
              # انتقال فایل‌ها
              for FILE in "$TMP_DIR"/*; do
                [ -f "$FILE" ] || continue
                
                BASENAME=$(basename "$FILE")
                SIZE=$(stat -c%s "$FILE")
                echo "  📦 $BASENAME ($(format_size $SIZE))"
                
                FOLDER_NAME=$(sanitize_name "${CHANNEL_NAME}_${BASENAME%.*}")
                FINAL_PATH="$BACKUP_DIR/$FOLDER_NAME"
                mkdir -p "$FINAL_PATH"
                
                cp "$FILE" "$FINAL_PATH/$BASENAME"
                
                # ساخت README
                SIZE_FORMATTED=$(format_size $SIZE)
                FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
                FILE_ENCODED=$(urlencode "$BASENAME")
                
                cat > "$FINAL_PATH/README.md" << 'README_EOF'
# ${BASENAME%.*}

---

## 📋 Content Information

| Property | Value |
|----------|-------|
| **Source** | [@${CHANNEL_NAME}](https://t.me/${CHANNEL_NAME}) |
| **Original Link** | ${TG_LINK} |
| **Size** | ${SIZE_FORMATTED} |
| **Type** | ${CONTENT_TYPE} |
| **Status** | ✅ Downloaded |

---

## 📥 Download

> ⚠️ This file will be automatically deleted **5 minutes** after download.

| # | File | Link |
|---|------|------|
| 1 | \`${BASENAME}\` | [Download](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/videos/${FOLDER_ENCODED}/${FILE_ENCODED}) |

---

*Downloaded via [khashayar.one](https://khashayar.one)*
README_EOF
                
                echo "  📝 README created"
              done
            else
              echo "⚠️ Media download failed, trying text only..."
            fi
            
            rm -rf "$TMP_DIR"
          fi
          
          # ══════════════════════════════════════════════
          # دانلود متن
          # ══════════════════════════════════════════════
          
          if [ "$CONTENT_TYPE" = "text" ] || [ "$CONTENT_TYPE" = "all" ]; then
            echo "📝 Extracting text content..."
            
            TEXT_TMP="/tmp/tg_text_$$"
            mkdir -p "$TEXT_TMP"
            
            # استخراج متن از embed تلگرام
            curl -s "https://t.me/s/${CHANNEL_NAME}/${POST_ID}?embed=1" > "$TEXT_TMP/page.html" 2>/dev/null
            
            if [ -s "$TEXT_TMP/page.html" ]; then
              # استخراج متن
              TEXT_CONTENT=$(grep -oP '<meta property="og:description" content="\K[^"]+' "$TEXT_TMP/page.html" 2>/dev/null || echo "")
              
              if [ -n "$TEXT_CONTENT" ]; then
                echo "$TEXT_CONTENT" | python3 -c "import sys, html; print(html.unescape(sys.stdin.read()))" > "$TEXT_TMP/post.txt"
                
                FOLDER_NAME=$(sanitize_name "${CHANNEL_NAME}_${POST_ID}_text")
                FINAL_PATH="$BACKUP_DIR/$FOLDER_NAME"
                mkdir -p "$FINAL_PATH"
                
                cp "$TEXT_TMP/post.txt" "$FINAL_PATH/post.txt"
                
                # ساخت README
                TEXT_LENGTH=$(wc -c < "$FINAL_PATH/post.txt")
                FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
                
                cat > "$FINAL_PATH/README.md" << README_EOF
# 📝 Text Post

---

## 📋 Content Information

| Property | Value |
|----------|-------|
| **Source** | [@${CHANNEL_NAME}](https://t.me/${CHANNEL_NAME}) |
| **Original Link** | ${TG_LINK} |
| **Length** | ${TEXT_LENGTH} characters |
| **Type** | 📝 Text |
| **Status** | ✅ Downloaded |

---

## 📥 Download

| # | File | Link |
|---|------|------|
| 1 | \`post.txt\` | [View](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/videos/${FOLDER_ENCODED}/post.txt) |

---

*Downloaded via [khashayar.one](https://khashayar.one)*
README_EOF
                
                echo "  ✅ Text extracted (${TEXT_LENGTH} chars)"
              else
                echo "  ⚠️ No text found in this post"
              fi
            else
              echo "  ⚠️ Could not fetch page"
            fi
            
            rm -rf "$TEXT_TMP"
          fi
          
          # ══════════════════════════════════════════════
          # گزارش نهایی
          # ══════════════════════════════════════════════
          
          FILE_COUNT=$(find "$BACKUP_DIR" -type f ! -name "README.md" 2>/dev/null | wc -l)
          
          echo ""
          echo "════════════════════════════════════════════"
          echo "  📊 Downloaded: $FILE_COUNT file(s)"
          echo "════════════════════════════════════════════"
          
          echo "FILE_COUNT=$FILE_COUNT" >> $GITHUB_ENV

      - name: "🛑 Disconnect warp-cli"
        if: always()
        run: |
          warp-cli disconnect 2>/dev/null || true

      - name: "📤 Push to Repository"
        id: push
        shell: bash
        run: |
          cd /__w/Bale-YouTube-Downloader/Bale-YouTube-Downloader 2>/dev/null || cd /__w/*/Bale-YouTube-Downloader 2>/dev/null || true
          git config --global --add safe.directory /__w/Bale-YouTube-Downloader/Bale-YouTube-Downloader 2>/dev/null || true
          
          BACKUP_DIR="${{ env.BACKUP_DIR }}"
          BRANCH="main"
          FILE_COUNT="${{ env.FILE_COUNT }}"
          
          if [ "$FILE_COUNT" -eq 0 ] || [ ! -d "$BACKUP_DIR" ]; then
            echo "⚠️ No files to push"; exit 0
          fi
          
          git fetch origin "$BRANCH" --quiet
          git reset --hard origin/"$BRANCH" --quiet
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/ 2>/dev/null || true
          
          # ⭐ UPDATE MASTER README ⭐
          echo "📝 Updating master videos list..."
          MASTER_README="videos/README.md"
          {
            echo "# 🎬 Downloaded Telegram Content"
            echo ""
            echo "| # | Channel | Type | Content | Link |"
            echo "|---|---------|------|---------|------|"
          } > "$MASTER_README"
          
          NUM=0
          for folder in videos/*/; do
            [ -d "$folder" ] || continue
            FOLDER_NAME=$(basename "$folder")
            [ -f "$folder/README.md" ] || continue
            NUM=$((NUM + 1))
            
            CHANNEL=$(grep -oP '\[@\K[^]]+' "$folder/README.md" 2>/dev/null | head -1 || echo "unknown")
            TYPE=$(grep -oP '📝 Text|🎬 Video|🎵 Audio|🖼️ Photo|📄 File' "$folder/README.md" 2>/dev/null | head -1 || echo "📦 Content")
            
            FOLDER_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FOLDER_NAME" 2>/dev/null || echo "$FOLDER_NAME")
            FOLDER_LINK="https://github.com/khashayardev/Bale-YouTube-Downloader/tree/main/videos/${FOLDER_ENCODED}"
            
            echo "| $NUM | @$CHANNEL | $TYPE | $FOLDER_NAME | [View]($FOLDER_LINK) |" >> "$MASTER_README"
          done
          
          echo "" >> "$MASTER_README"
          echo "*Auto-generated list*" >> "$MASTER_README"
          git add -f "$MASTER_README"
          git add -f videos/
          
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          
          git commit -m "[khashayar.one] 📥 Telegram download [skip ci]" --quiet || true
          
          for i in $(seq 1 10); do
            if timeout 120 git push --force origin HEAD:"$BRANCH" 2>&1; then
              echo "✅ Pushed (attempt $i)"; break
            else
              [ $i -ge 10 ] && echo "🚫 All push attempts failed" && exit 1
              sleep $((3 + RANDOM % 10))
              git fetch origin "$BRANCH" --quiet
              git reset --hard origin/"$BRANCH" --quiet
              cp -r "$BACKUP_DIR"/* videos/ 2>/dev/null || true
              git add -f videos/
              git commit -m "[khashayar.one] 📥 Retry push [skip ci]" --quiet || true
            fi
          done
          
          echo "════════════════════════════════════════"
          echo "  ✅ Complete"
          echo "════════════════════════════════════════"
