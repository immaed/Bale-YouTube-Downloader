# ============================================================
# build-docker.yml — Build & Push Docker Image
# پشتیبانی از ساخت خودکار برای کاربران فورک‌شده
# با چک کردن وجود ریپو و راهنمایی برای ساخت
# ============================================================

name: "🐳 Build Docker Image"

on:
  workflow_dispatch:
    inputs:
      docker_username:
        description: "👤 Docker Hub Username"
        required: true
        type: string
        default: ""
      docker_repo:
        description: "📦 Repository Name"
        required: false
        type: string
        default: "bale-yt-downloader"
      docker_token:
        description: "🔑 Docker Hub Access Token"
        required: true
        type: string
        default: ""
      image_tag:
        description: "🏷️ Image Tag"
        required: false
        type: string
        default: "latest"

jobs:
  build:
    name: "🔨 Build & Push"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔑 Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ github.event.inputs.docker_username }}
          password: ${{ github.event.inputs.docker_token }}

      - name: "🔍 Check if Repository Exists"
        id: check_repo
        run: |
          USERNAME="${{ github.event.inputs.docker_username }}"
          REPO="${{ github.event.inputs.docker_repo }}"
          TOKEN="${{ github.event.inputs.docker_token }}"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${USERNAME}/${REPO}/")
          
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Repository '${USERNAME}/${REPO}' found!"
            echo "repo_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Repository '${USERNAME}/${REPO}' NOT found."
            echo "repo_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: "📝 Repository Not Found — Show Instructions"
        if: steps.check_repo.outputs.repo_exists == 'false'
        run: |
          USERNAME="${{ github.event.inputs.docker_username }}"
          REPO="${{ github.event.inputs.docker_repo }}"
          
          echo "══════════════════════════════════════════════════"
          echo "  ❌ Repository Not Found!"
          echo ""
          echo "  Please create the repository first:"
          echo "  🔗 https://hub.docker.com/repository/create?name=${REPO}&namespace=${USERNAME}"
          echo ""
          echo "  After creating it, run this workflow again."
          echo "══════════════════════════════════════════════════"
          exit 1

      - name: "🐳 Build & Push"
        if: steps.check_repo.outputs.repo_exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ github.event.inputs.docker_username }}/${{ github.event.inputs.docker_repo }}:${{ github.event.inputs.image_tag }}

      - name: "✅ Success"
        if: success()
        run: |
          USERNAME="${{ github.event.inputs.docker_username }}"
          REPO="${{ github.event.inputs.docker_repo }}"
          TAG="${{ github.event.inputs.image_tag }}"
          
          echo "════════════════════════════════════════════"
          echo "  ✅ Image Built & Pushed!"
          echo "  📦 ${USERNAME}/${REPO}:${TAG}"
          echo "  🔗 https://hub.docker.com/r/${USERNAME}/${REPO}"
          echo ""
          echo "  Use in workflow:"
          echo "  container:"
          echo "    image: ${USERNAME}/${REPO}:${TAG}"
          echo "════════════════════════════════════════════"
