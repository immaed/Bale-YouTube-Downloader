# ============================================================
# build-docker.yml — Build & Push Docker Image
# پشتیبانی از ساخت خودکار برای کاربران فورک‌شده
# اجرا: دستی با وارد کردن اطلاعات Docker Hub
# ============================================================

name: "🐳 Build Docker Image"

on:
  workflow_dispatch:
    inputs:
      docker_username:
        description: "👤 Docker Hub Username"
        required: true
        type: string
        default: ""
      docker_token:
        description: "🔑 Docker Hub Access Token (never stored)"
        required: true
        type: string
        default: ""
      image_tag:
        description: "🏷️ Image Tag (default: latest)"
        required: false
        type: string
        default: "latest"

jobs:
  build:
    name: "🔨 Build & Push"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔑 Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ github.event.inputs.docker_username }}
          password: ${{ github.event.inputs.docker_token }}

      - name: "🐳 Build & Push"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ github.event.inputs.docker_username }}/bale-yt-downloader:${{ github.event.inputs.image_tag }}

      - name: "✅ Success Message"
        run: |
          echo "════════════════════════════════════════════"
          echo "  ✅ Image built and pushed successfully!"
          echo "  📦 Image: ${{ github.event.inputs.docker_username }}/bale-yt-downloader:${{ github.event.inputs.image_tag }}"
          echo "  🔗 https://hub.docker.com/r/${{ github.event.inputs.docker_username }}/bale-yt-downloader"
          echo "════════════════════════════════════════════"
