# ============================================================
# libgen-scihub-dl.yml — Bale LibGen & Sci-Hub Downloader
# V2.0 — Persian Support + Multi-Source Fallback
# Repository: Bale-YouTube-Downloader
# ============================================================

name: "📚 LibGen & Sci-Hub Downloader"

on:
  workflow_dispatch:
    inputs:
      source:
        description: "📚 منبع دانلود"
        required: true
        type: choice
        default: "libgen"
        options:
          - libgen
          - scihub
      query:
        description: "🔍 عنوان کتاب / ISBN / DOI (برای Sci-Hub فقط DOI)"
        required: true
        type: string
        default: ""
      language:
        description: "🌐 زبان (فقط برای LibGen)"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - english
          - persian
      max_results:
        description: "📊 حداکثر نتایج جستجو (۱ تا ۱۰)"
        required: false
        type: string
        default: "5"

env:
  PROJECT_NAME: "Bale Academic Downloader"

jobs:
  download:
    name: "📥 Download & Store"
    runs-on: ubuntu-latest
    container:
      image: khashayardev/bale-yt-downloader:latest
      options: --privileged
    timeout-minutes: 120
    permissions:
      contents: write
      actions: read

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          filter: blob:none

      - name: "⚙️ Configure Git"
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: "📦 Verify Dependencies"
        run: |
          echo "✅ Pre-installed in Docker image"
          python3 --version
          jq --version
          curl --version | head -1

      - name: "🔧 Setup Download Parameters"
        id: setup
        shell: bash
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          QUERY="${{ github.event.inputs.query }}"
          LANGUAGE="${{ github.event.inputs.language }}"
          MAX_RESULTS="${{ github.event.inputs.max_results }}"
          
          echo "════════════════════════════════════════"
          echo "  $PROJECT_NAME"
          echo "════════════════════════════════════════"
          echo "📚 Source: $SOURCE"
          echo "🔍 Query: $QUERY"
          echo "🌐 Language: $LANGUAGE"
          echo "📊 Max Results: $MAX_RESULTS"
          
          echo "SOURCE=$SOURCE" >> $GITHUB_ENV
          echo "ORIGINAL_QUERY=$QUERY" >> $GITHUB_ENV
          echo "QUERY=$QUERY" >> $GITHUB_ENV
          echo "LANGUAGE=$LANGUAGE" >> $GITHUB_ENV
          echo "MAX_RESULTS=$MAX_RESULTS" >> $GITHUB_ENV
          echo "BACKUP_DIR=/tmp/academic_dl_$$" >> $GITHUB_ENV
          
          mkdir -p /tmp/academic_dl_$$
          echo "✅ Setup complete"

      - name: "📚 Download Academic Content"
        id: download
        shell: bash
        run: |
          #!/bin/bash
          set -e
          
          SOURCE="${{ env.SOURCE }}"
          ORIGINAL_QUERY="${{ env.ORIGINAL_QUERY }}"
          QUERY="${{ env.QUERY }}"
          LANGUAGE="${{ env.LANGUAGE }}"
          MAX_RESULTS="${{ env.MAX_RESULTS }}"
          BACKUP_DIR="${{ env.BACKUP_DIR }}"
          
          sanitize_name() {
            local name="$1"
            name=$(echo "$name" | LC_ALL=C tr '[:space:]｜　' '---' | LC_ALL=C tr -c 'a-zA-Z0-9_-' '-' | tr -s '-' | sed 's/^-//;s/-$//')
            [ -z "$name" ] && name="document"
            echo "$name"
          }
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          format_size() {
            local size=$1
            if [ "$size" -gt 1048576 ]; then
              echo "$(echo "scale=1; $size/1048576" | bc) MB"
            elif [ "$size" -gt 1024 ]; then
              echo "$(echo "scale=1; $size/1024" | bc) KB"
            else
              echo "${size} B"
            fi
          }
          
          # ══════════════════════════════════════════════
          # تابع جستجوی LibGen (چند بار صدا زده میشه)
          # ══════════════════════════════════════════════
          
          search_libgen() {
            local SEARCH_TERM="$1"
            local RESULT_FILE="$2"
            
            echo "  🔍 Searching LibGen for: $SEARCH_TERM"
            
            local ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SEARCH_TERM'))")
            
            for LIBGEN_HOST in libgen.is libgen.st libgen.li libgen.gs; do
              local RESP=$(curl -s "https://${LIBGEN_HOST}/json.php?req=${ENCODED}&lg_topic=libgen&open=0&view=simple&res=${MAX_RESULTS}&column=title" 2>/dev/null || echo "[]")
              local COUNT=$(echo "$RESP" | jq '. | length' 2>/dev/null || echo 0)
              
              if [ "$COUNT" -gt 0 ]; then
                echo "$RESP" > "$RESULT_FILE"
                echo "  ✅ Found $COUNT result(s) on $LIBGEN_HOST"
                return 0
              fi
            done
            
            echo "[]" > "$RESULT_FILE"
            return 1
          }
          
          # ══════════════════════════════════════════════
          # تابع ترجمه فارسی به انگلیسی
          # ══════════════════════════════════════════════
          
          translate_persian() {
            local TEXT="$1"
            
            # روش ۱: LibreTranslate
            local RESULT=$(curl -s "https://libretranslate.com/translate" \
              -H "Content-Type: application/json" \
              -d "{\"q\":\"$TEXT\",\"source\":\"fa\",\"target\":\"en\",\"format\":\"text\"}" 2>/dev/null | \
              jq -r '.translatedText // empty' 2>/dev/null)
            
            if [ -n "$RESULT" ] && [ "$RESULT" != "null" ]; then
              echo "$RESULT"
              return 0
            fi
            
            # روش ۲: MyMemory (رایگان، بدون API key)
            RESULT=$(curl -s "https://api.mymemory.translated.net/get?q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TEXT'))")&langpair=fa|en" 2>/dev/null | \
              jq -r '.responseData.translatedText // empty' 2>/dev/null)
            
            if [ -n "$RESULT" ] && [ "$RESULT" != "null" ]; then
              echo "$RESULT"
              return 0
            fi
            
            return 1
          }
          
          # ══════════════════════════════════════════════
          # تشخیص ISBN از ورودی
          # ══════════════════════════════════════════════
          
          extract_isbn() {
            local INPUT="$1"
            # تشخیص ISBN-10 یا ISBN-13
            local ISBN=$(echo "$INPUT" | grep -oP '(\d{10}|\d{13}|\d{3}-\d{1,5}-\d{1,7}-\d{1,7}-\d{1})' | head -1)
            echo "$ISBN"
          }
          
          # ══════════════════════════════════════════════
          # LIBGEN — Multi-Strategy Search
          # ══════════════════════════════════════════════
          
          if [ "$SOURCE" = "libgen" ]; then
            RESULTS_FILE="/tmp/libgen_results.json"
            FOUND=false
            
            # ══ Strategy 1: ISBN (دقیق‌ترین) ══
            ISBN=$(extract_isbn "$ORIGINAL_QUERY")
            if [ -n "$ISBN" ]; then
              echo "📚 Strategy 1: Searching by ISBN: $ISBN"
              if search_libgen "$ISBN" "$RESULTS_FILE"; then
                FOUND=true
              fi
            fi
            
            # ══ Strategy 2: عبارت اصلی ══
            if [ "$FOUND" = false ]; then
              echo "📚 Strategy 2: Searching with original query"
              if search_libgen "$QUERY" "$RESULTS_FILE"; then
                FOUND=true
              fi
            fi
            
            # ══ Strategy 3: تشخیص فارسی + ترجمه ══
            if [ "$FOUND" = false ]; then
              if echo "$QUERY" | grep -qP '[\x{0600}-\x{06FF}]'; then
                echo "📚 Strategy 3: Persian detected, translating..."
                TRANSLATED=$(translate_persian "$QUERY")
                
                if [ -n "$TRANSLATED" ]; then
                  echo "  ✅ Translated: $TRANSLATED"
                  if search_libgen "$TRANSLATED" "$RESULTS_FILE"; then
                    FOUND=true
                  fi
                else
                  echo "  ⚠️ Translation failed"
                fi
              fi
            fi
            
            # ══ Strategy 4: جستجوی انگلیسی با حذف کاراکترهای فارسی ══
            if [ "$FOUND" = false ]; then
              # استخراج کلمات انگلیسی از متن ترکیبی
              ENGLISH_PART=$(echo "$QUERY" | grep -oP '[a-zA-Z0-9\s\-]+' | tr '\n' ' ' | sed 's/  / /g' | xargs)
              
              if [ -n "$ENGLISH_PART" ] && [ ${#ENGLISH_PART} -gt 3 ]; then
                echo "📚 Strategy 4: English part only: $ENGLISH_PART"
                if search_libgen "$ENGLISH_PART" "$RESULTS_FILE"; then
                  FOUND=true
                fi
              fi
            fi
            
            # ══ Strategy 5: جستجوی نویسنده (اگر با کاما جدا شده) ══
            if [ "$FOUND" = false ]; then
              AUTHOR_PART=$(echo "$QUERY" | grep -oP '^[^,]+' | head -1)
              if [ -n "$AUTHOR_PART" ] && [ "$AUTHOR_PART" != "$QUERY" ]; then
                echo "📚 Strategy 5: Searching by author: $AUTHOR_PART"
                if search_libgen "$AUTHOR_PART" "$RESULTS_FILE"; then
                  FOUND=true
                fi
              fi
            fi
            
            # ══ Strategy 6: Mirror ایرانی (کتاب‌های فارسی) ══
            if [ "$FOUND" = false ]; then
              echo "📚 Strategy 6: Trying Iranian book sources..."
              
              # تلاش برای یافتن ISBN از فیپا
              if echo "$QUERY" | grep -qP '[\x{0600}-\x{06FF}]'; then
                FIPA_SEARCH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$QUERY'))")
                
                for FIPA_HOST in opac.nlai.ir ketab.ir fidibo.com; do
                  echo "  🔍 Checking $FIPA_HOST..."
                  # فقط بررسی می‌کنیم که سایت در دسترس هست یا نه
                  if curl -s --max-time 5 "https://${FIPA_HOST}/" &>/dev/null; then
                    echo "  ℹ️ $FIPA_HOST is accessible (manual search recommended)"
                  fi
                done
              fi
            fi
            
            # ══ پردازش نتایج ══
            if [ "$FOUND" = false ]; then
              echo ""
              echo "  ❌ No books found after all 6 strategies"
              echo "  💡 Suggestions:"
              echo "     - Try searching by ISBN (e.g. 9789645300000)"
              echo "     - Try English title: Advanced Investment Management"
              echo "     - Try author name only: Reza Raei"
              echo "FILE_COUNT=0" >> $GITHUB_ENV
              exit 0
            fi
            
            RESULT_COUNT=$(jq '. | length' "$RESULTS_FILE" 2>/dev/null || echo 0)
            echo ""
            echo "  ✅ Found $RESULT_COUNT book(s) total"
            
            # پردازش هر نتیجه
            for ((i=0; i<RESULT_COUNT; i++)); do
              echo ""
              echo "  ─────────────────────────────────────"
              echo "  📚 Processing book $((i+1))/$RESULT_COUNT"
              
              TITLE=$(jq -r ".[$i].title // \"Unknown Title\"" "$RESULTS_FILE" 2>/dev/null)
              AUTHOR=$(jq -r ".[$i].author // \"Unknown Author\"" "$RESULTS_FILE" 2>/dev/null)
              YEAR=$(jq -r ".[$i].year // \"\"" "$RESULTS_FILE" 2>/dev/null)
              PAGES=$(jq -r ".[$i].pages // \"\"" "$RESULTS_FILE" 2>/dev/null)
              ISBN_VAL=$(jq -r ".[$i].isbn // \"\"" "$RESULTS_FILE" 2>/dev/null)
              MD5=$(jq -r ".[$i].md5 // \"\"" "$RESULTS_FILE" 2>/dev/null)
              EXTENSION=$(jq -r ".[$i].extension // \"pdf\"" "$RESULTS_FILE" 2>/dev/null)
              FILESIZE=$(jq -r ".[$i].filesize // \"0\"" "$RESULTS_FILE" 2>/dev/null)
              
              echo "  📖 Title: $TITLE"
              echo "  👤 Author: $AUTHOR"
              echo "  📅 Year: ${YEAR:-N/A}"
              
              if [ -z "$MD5" ] || [ "$MD5" = "null" ]; then
                echo "  ⚠️ No MD5 hash, skipping..."
                continue
              fi
              
              MD5_PREFIX="${MD5:0:2}"
              DOWNLOAD_URL="https://download.library.lol/main/${MD5_PREFIX}/${MD5}/${MD5}.${EXTENSION}"
              
              echo "  📥 Downloading..."
              
              FOLDER_NAME=$(sanitize_name "${AUTHOR}_${TITLE}")
              FOLDER_NAME="${FOLDER_NAME:0:80}"
              FINAL_PATH="$BACKUP_DIR/$FOLDER_NAME"
              mkdir -p "$FINAL_PATH"
              
              if curl -L --progress-bar -o "$FINAL_PATH/book.${EXTENSION}" "$DOWNLOAD_URL" 2>/dev/null; then
                FILE_SIZE=$(stat -c%s "$FINAL_PATH/book.${EXTENSION}" 2>/dev/null || echo 0)
                
                if [ "$FILE_SIZE" -gt 1000 ]; then
                  echo "  ✅ Downloaded ($(format_size $FILE_SIZE))"
                  
                  printf '{\n  "title": "%s",\n  "author": "%s",\n  "year": "%s",\n  "pages": "%s",\n  "isbn": "%s",\n  "format": "%s",\n  "size": "%s",\n  "source": "LibGen",\n  "md5": "%s"\n}\n' \
                    "$TITLE" "$AUTHOR" "$YEAR" "$PAGES" "$ISBN_VAL" "$EXTENSION" "$FILESIZE" "$MD5" \
                    > "$FINAL_PATH/metadata.json"
                  
                  FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
                  FILE_ENCODED="book.${EXTENSION}"
                  RAW_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"
                  SIZE_FORMATTED=$(format_size $FILE_SIZE)
                  
                  printf '%s\n' \
                    "# 📚 ${TITLE}" \
                    "" "---" "" "## 📋 Book Information" "" \
                    "| Property | Value |" "|----------|-------|" \
                    "| **Title** | ${TITLE} |" \
                    "| **Author** | ${AUTHOR} |" \
                    "| **Year** | ${YEAR:-N/A} |" \
                    "| **Pages** | ${PAGES:-N/A} |" \
                    "| **ISBN** | ${ISBN_VAL:-N/A} |" \
                    "| **Format** | ${EXTENSION} |" \
                    "| **Size** | ${SIZE_FORMATTED} |" \
                    "| **Source** | [LibGen](https://libgen.is) |" \
                    "| **Status** | ✅ Downloaded |" \
                    "" "---" "" "## 📥 Download" "" \
                    "| # | File | Link |" "|---|------|------|" \
                    "| 1 | \`book.${EXTENSION}\` | [Download](${RAW_URL}) |" \
                    "" "---" "" "*Downloaded via [khashayar.one](https://khashayar.one)*" \
                    > "$FINAL_PATH/README.md"
                  
                  echo "  📝 README created"
                else
                  echo "  ⚠️ File too small, corrupted"
                  rm -f "$FINAL_PATH/book.${EXTENSION}"
                fi
              else
                echo "  ❌ Download failed"
              fi
            done
          fi
          
          # ══════════════════════════════════════════════
          # SCI-HUB
          # ══════════════════════════════════════════════
          
          if [ "$SOURCE" = "scihub" ]; then
            echo "📄 Downloading from Sci-Hub..."
            
            DOI=$(echo "$QUERY" | tr -d ' ')
            
            SCIHUB_MIRRORS=(
              "https://sci-hub.pub"
              "https://sci-hub.se"
              "https://sci-hub.st"
              "https://sci-hub.ru"
            )
            
            DOWNLOADED=false
            
            for MIRROR in "${SCIHUB_MIRRORS[@]}"; do
              echo "  🔄 Trying: $MIRROR"
              
              if curl -L --max-time 60 --progress-bar -o "$BACKUP_DIR/paper.pdf" "${MIRROR}/${DOI}" 2>/dev/null; then
                FILE_SIZE=$(stat -c%s "$BACKUP_DIR/paper.pdf" 2>/dev/null || echo 0)
                
                if [ "$FILE_SIZE" -gt 10000 ] && head -c 4 "$BACKUP_DIR/paper.pdf" | grep -q '%PDF'; then
                  echo "  ✅ Downloaded ($(format_size $FILE_SIZE))"
                  
                  FOLDER_NAME=$(sanitize_name "scihub_${DOI}")
                  FINAL_PATH="$BACKUP_DIR/$FOLDER_NAME"
                  mkdir -p "$FINAL_PATH"
                  mv "$BACKUP_DIR/paper.pdf" "$FINAL_PATH/paper.pdf"
                  
                  printf '{\n  "doi": "%s",\n  "source": "Sci-Hub",\n  "mirror": "%s",\n  "format": "PDF"\n}\n' \
                    "$DOI" "$MIRROR" > "$FINAL_PATH/metadata.json"
                  
                  FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
                  RAW_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/videos/${FOLDER_ENCODED}/paper.pdf"
                  SIZE_FORMATTED=$(format_size $FILE_SIZE)
                  
                  printf '%s\n' \
                    "# 📄 Scientific Paper" "" "---" "" "## 📋 Paper Information" "" \
                    "| Property | Value |" "|----------|-------|" \
                    "| **DOI** | ${DOI} |" \
                    "| **Source** | [Sci-Hub](${MIRROR}) |" \
                    "| **Size** | ${SIZE_FORMATTED} |" \
                    "| **Format** | PDF |" \
                    "| **Status** | ✅ Downloaded |" \
                    "" "---" "" "## 📥 Download" "" \
                    "| # | File | Link |" "|---|------|------|" \
                    "| 1 | \`paper.pdf\` | [Download](${RAW_URL}) |" \
                    "" "---" "" "*Downloaded via [khashayar.one](https://khashayar.one)*" \
                    > "$FINAL_PATH/README.md"
                  
                  echo "  📝 README created"
                  DOWNLOADED=true
                  break
                else
                  rm -f "$BACKUP_DIR/paper.pdf"
                fi
              fi
            done
            
            if [ "$DOWNLOADED" = false ]; then
              echo "  ❌ All Sci-Hub mirrors failed"
            fi
          fi
          
          FILE_COUNT=$(find "$BACKUP_DIR" -type f ! -name "README.md" ! -name "metadata.json" 2>/dev/null | wc -l)
          echo ""
          echo "════════════════════════════════════════════"
          echo "  📊 Total files: $FILE_COUNT"
          echo "════════════════════════════════════════════"
          echo "FILE_COUNT=$FILE_COUNT" >> $GITHUB_ENV

      - name: "📤 Push to Repository"
        id: push
        shell: bash
        run: |
          cd /__w/Bale-YouTube-Downloader/Bale-YouTube-Downloader 2>/dev/null || cd /__w/*/Bale-YouTube-Downloader 2>/dev/null || true
          git config --global --add safe.directory /__w/Bale-YouTube-Downloader/Bale-YouTube-Downloader 2>/dev/null || true
          
          BACKUP_DIR="${{ env.BACKUP_DIR }}"
          BRANCH="main"
          FILE_COUNT="${{ env.FILE_COUNT }}"
          SOURCE="${{ env.SOURCE }}"
          
          if [ "$FILE_COUNT" -eq 0 ] || [ ! -d "$BACKUP_DIR" ]; then
            echo "⚠️ No files to push"; exit 0
          fi
          
          git fetch origin "$BRANCH" --quiet
          git reset --hard origin/"$BRANCH" --quiet
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/ 2>/dev/null || true
          
          echo "📝 Updating master videos list..."
          MASTER_README="videos/README.md"
          
          if [ "$SOURCE" = "libgen" ]; then
            MASTER_TITLE="# 📚 Downloaded Books (LibGen)"
          else
            MASTER_TITLE="# 📄 Downloaded Papers (Sci-Hub)"
          fi
          
          { echo "$MASTER_TITLE"; echo ""; echo "| # | Title | Author | Size | Link |"; echo "|---|-------|--------|------|------|"; } > "$MASTER_README"
          
          NUM=0
          for folder in videos/*/; do
            [ -d "$folder" ] || continue
            FOLDER_NAME=$(basename "$folder")
            [ -f "$folder/README.md" ] || continue
            NUM=$((NUM + 1))
            
            TITLE=$(grep -oP '^# 📚 \K.*|^# 📄 \K.*' "$folder/README.md" 2>/dev/null | head -1 || echo "$FOLDER_NAME")
            AUTHOR=$(grep -oP '\*\*Author\*\* \| \K[^|]+' "$folder/README.md" 2>/dev/null | head -1 | tr -d ' ' || echo "N/A")
            SIZE=$(grep -oP '\*\*Size\*\* \| \K[^|]+' "$folder/README.md" 2>/dev/null | head -1 | tr -d ' ' || echo "N/A")
            
            FOLDER_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FOLDER_NAME" 2>/dev/null || echo "$FOLDER_NAME")
            FOLDER_LINK="https://github.com/khashayardev/Bale-YouTube-Downloader/tree/main/videos/${FOLDER_ENCODED}"
            
            echo "| $NUM | ${TITLE:0:50} | ${AUTHOR:0:30} | $SIZE | [View]($FOLDER_LINK) |" >> "$MASTER_README"
          done
          
          echo "" >> "$MASTER_README"
          echo "*Auto-generated list*" >> "$MASTER_README"
          git add -f "$MASTER_README"
          git add -f videos/
          
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          
          git commit -m "[khashayar.one] 📚 Academic download ($SOURCE) [skip ci]" --quiet || true
          
          for i in $(seq 1 10); do
            if timeout 120 git push --force origin HEAD:"$BRANCH" 2>&1; then
              echo "✅ Pushed (attempt $i)"; break
            else
              [ $i -ge 10 ] && echo "🚫 All push attempts failed" && exit 1
              sleep $((3 + RANDOM % 10))
              git fetch origin "$BRANCH" --quiet
              git reset --hard origin/"$BRANCH" --quiet
              cp -r "$BACKUP_DIR"/* videos/ 2>/dev/null || true
              git add -f videos/
              git commit -m "[khashayar.one] 📚 Retry push ($SOURCE) [skip ci]" --quiet || true
            fi
          done
          
          echo "════════════════════════════════════════"
          echo "  ✅ Complete"
          echo "════════════════════════════════════════"
