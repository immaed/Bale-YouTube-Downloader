<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300">
  <!-- فونت وزیر -->
  <defs>
    <style>
      @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');
      text {
        font-family: 'Vazirmatn', sans-serif;
      }
    </style>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9A7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- پس‌زمینه -->
  <rect width="960" height="300" rx="20" fill="url(#bg)" />

  <!-- اشکال تزئینی -->
  <circle cx="110" cy="80" r="150" fill="url(#accent)" opacity="0.08" />
  <circle cx="810" cy="240" r="120" fill="url(#accent2)" opacity="0.05" />
  <circle cx="460" cy="50" r="80" fill="url(#accent)" opacity="0.04" />

  <!-- آیکون دانلود (راست) -->
  <g transform="translate(830, 150)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4" />
    <circle cx="0" cy="0" r="45" fill="url(#accent)" opacity="0.1" />

    <rect x="-16" y="-28" width="32" height="36" rx="4" fill="url(#accent)" />
    <polygon points="0,-5 -12,10 12,10" fill="#0D1117" />
    <rect x="-4" y="-18" width="8" height="10" rx="2" fill="#0D1117" />
    <rect x="-4" y="42" width="8" height="6" rx="2" fill="url(#accent)" />
  </g>

  <!-- متن اصلی (راست‌چین) -->
  <text x="740" y="80" font-family="'Vazirmatn', 'Segoe UI', 'Tahoma', 'Arial', sans-serif" font-weight="900" font-size="38" fill="#E6EDF3" text-anchor="end">
    دانلودر یوتیوب
  </text>

  <!-- عنوان انگلیسی -->
  <text x="740" y="125" font-family="'Vazirmatn', 'Segoe UI', 'Tahoma', 'Arial', sans-serif" font-weight="800" font-size="34" fill="url(#accent)" text-anchor="end">
    Bale YouTube Downloader
  </text>

  <!-- خط جداکننده -->
  <line x1="340" y1="150" x2="740" y2="150" stroke="url(#accent)" stroke-width="3" opacity="0.6" stroke-linecap="round" />

  <!-- توضیح فارسی -->
  <text x="740" y="180" font-family="'Vazirmatn', 'Segoe UI', 'Tahoma', 'Arial', sans-serif" font-weight="400" font-size="17" fill="#8B949E" text-anchor="end">
    ربات دانلود ویدیوهای یوتیوب برای پیام‌رسان بله
  </text>

  <text x="740" y="205" font-family="'Vazirmatn', 'Segoe UI', 'Tahoma', 'Arial', sans-serif" font-weight="300" font-size="14" fill="#6E7681" text-anchor="end">
    بدون نیاز به سرور • کاملاً رایگان • قدرت گرفته از GitHub Actions
  </text>

  <!-- تگ‌ها (راست‌چین) -->
  <rect x="600" y="225" width="140" height="26" rx="13" fill="url(#accent)" opacity="0.15" />
  <text x="670" y="243" font-family="'Vazirmatn', 'Segoe UI', 'Tahoma', 'Arial', sans-serif" font-weight="500" font-size="12" fill="#00C9A7" text-anchor="middle">
    بدون سرور
  </text>

  <rect x="480" y="225" width="110" height="26" rx="13" fill="url(#accent)" opacity="0.15" />
  <text x="535" y="243" font-family="'Vazirmatn', 'Segoe UI', 'Tahoma', 'Arial', sans-serif" font-weight="500" font-size="12" fill="#00C9A7" text-anchor="middle">
    بدون هزینه
  </text>

  <rect x="340" y="225" width="130" height="26" rx="13" fill="url(#accent)" opacity="0.15" />
  <text x="405" y="243" font-family="'Vazirmatn', 'Segoe UI', 'Tahoma', 'Arial', sans-serif" font-weight="500" font-size="12" fill="#00C9A7" text-anchor="middle">
    GitHub Actions
  </text>

  <!-- خط پایین -->
  <rect x="0" y="290" width="960" height="10" fill="url(#accent)" opacity="0.3" rx="5" />
</svg>
